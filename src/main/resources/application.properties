spring.application.name=fashion_store_management_system
server.port=8081

#
# SQL Configuration
#
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=fashion_store_management_system;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

#
# Increase image size 1M -> 10M
#
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
