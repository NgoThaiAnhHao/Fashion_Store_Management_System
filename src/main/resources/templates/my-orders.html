<!DOCTYPE html>
<html lang="en" >
<head>
    <meta charset="UTF-8">
    <title>My Orders Today | Fashion Store</title>
    <link rel="shortcut icon" href="//cdn.hstatic.net/themes/1000184601/1001406013/14/favicon.png?v=1538" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link th:href="@{/css/fonts.css}" rel="stylesheet" />
    <link th:href="@{/css/globals.css}" rel="stylesheet" />
    <link th:href="@{/css/index.css}" rel="stylesheet" />
    <link th:href="@{/css/theme.css}" rel="stylesheet" />
</head>
<body>
<!-- Navbar -->
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="h-[72px]"></div>
<h1 class="inline-flex items-center gap-2 text-lg font-bold tracking-[0.1em] uppercase text-[#0B0B0B] hover:text-black transition-colors ml-12 mt-12">
    My Orders
</h1>

<!-- Empty Item -->
<div th:if="${orders.isEmpty()}" class="text-center py-24">
    <p class="text-gray-500 mb-2">Your orders are empty</p>
    <p class="text-sm text-gray-400 mb-8">Buy some production to get started</p>
    <a th:href="@{/fashion-store/dashboard}"
       class="inline-flex items-center gap-2 bg-[#E5E7EB] text-white px-8 py-4 text-xs tracking-[0.15em] uppercase hover:bg-gray-900 transition-colors">
        Shop Collection
    </a>
</div>

<div th:if="${!orders.isEmpty()}" class="overflow-hidden mb-10 mt-10 px-10">
    <div class="overflow-x-auto">
        <table class="w-full">
            <thead>
            <tr class="bg-gray-200 border-b border-[#E5E7EB]">
                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase whitespace-nowrap">
                    Order ID
                </th>

                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase whitespace-nowrap">
                    Total Amount
                </th>

                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase whitespace-nowrap">
                    Ordered Date
                </th>

                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase whitespace-nowrap">
                    Status
                </th>

                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase whitespace-nowrap">
                    Actions
                </th>
            </tr>

            </thead>

            <tbody>
            <tr th:each="order : ${orders}" class="border-b border-[#E5E7EB]/60 hover:bg-gray-50 transition-colors">
                <td class="px-4 py-3 text-xs font-medium text-[#0B0B0B] whitespace-nowrap">
                    #<span th:text="*{order.orderId}" ></span>
                </td>

                <td class="font-bold px-4 py-3 text-xs text-[#6B6B6B]">
                    $<span th:text="*{order.totalAmount}"></span>
                </td>

                <td th:text="*{order.getFormattedOrderedAt()}" class="px-4 py-3 text-xs  whitespace-nowrap"></td>

                <td class="px-4 py-3 whitespace-nowrap">
                    <div>
                        <select name="status"
                                disabled
                                class="text-xs rounded-full px-3 py-1 appearance-none border-0 font-medium "
                                th:classappend="
                                                    *{order.status.toString() == 'PENDING'} ? 'bg-emerald-100 text-emerald-700' :
                                                    (*{order.status.toString() == 'CONFIRMED'} ? 'bg-amber-100 text-amber-700' :
                                                    (*{order.status.toString() == 'SHIPPING'} ? 'bg-blue-100 text-blue-700' :
                                                    (*{order.status.toString() == 'COMPLETED'} ? 'bg-slate-100 text-slate-500' :
                                                    (*{order.status.toString() == 'CANCELLED'} ? 'bg-red-100 text-red-700' : 'bg-red-100 text-red-700'))))
                                                ">

                            <option value="PENDING"
                                    class="bg-emerald-100 text-emerald-700"
                                    th:selected="${order.status.toString() == 'PENDING'}">
                                Pending
                            </option>

                            <option value="CONFIRMED"
                                    class="bg-amber-100 text-amber-700"
                                    th:selected="${order.status.toString() == 'CONFIRMED'}">
                                Confirmed
                            </option>

                            <option value="SHIPPING"
                                    class="bg-blue-100 text-blue-700"
                                    th:selected="${order.status.toString() == 'SHIPPING'}">
                                Shipping
                            </option>

                            <option value="COMPLETED"
                                    class="bg-slate-100 text-slate-500"
                                    th:selected="${order.status.toString() == 'COMPLETED'}">
                                Completed
                            </option>

                            <option value="CANCELLED"
                                    class="bg-red-100 text-red-700"
                                    th:selected="${order.status.toString() == 'CANCELLED'}">
                                Cancelled
                            </option>

                            <option value="LOGO_REJECTED"
                                    class="bg-red-100 text-red-700"
                                    th:selected="${order.status.toString() == 'LOGO_REJECTED'}">
                                Logo Rejected
                            </option>
                        </select>
                        <p th:if="${order.status.toString() == 'LOGO_REJECTED' and order.rejectReason != null}"
                           class="text-xs text-red-600 mt-1">
                            Reason: <span th:text="${order.rejectReason}"></span>
                        </p>
                    </div>
                </td>

                <td class="px-4 py-3">
                    <div class="flex items-center gap-1">
                        <!-- View Order Detail-->
                        <a th:href="@{/fashion-store/order-detail/{orderId}(orderId=${order.orderId})}" class="w-7 h-7 rounded-lg flex items-center justify-center transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Footer -->
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
