<!DOCTYPE html>
<html lang="en" >
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link th:href="@{/css/fonts.css}" rel="stylesheet" />
    <link th:href="@{/css/globals.css}" rel="stylesheet" />
    <link th:href="@{/css/index.css}" rel="stylesheet" />
    <link th:href="@{/css/theme.css}" rel="stylesheet" />
</head>
<body>
<!-- Navbar -->
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="h-[72px]"></div>

<!-- MAIN CONTENT -->
<div class="max-w-7xl mx-auto px-4 py-10">
    <h1 class="inline-flex items-center gap-2 text-lg font-bold tracking-[0.1em] uppercase text-[#222222] hover:text-black transition-colors">
        Order Details -
        <span class="text-sm font-medium">
                            Order #<span th:text="${order.orderId}"></span>
                    </span>
    </h1>

    <h1 class="items-center gap-2 text-xs text-gray-500 mb-10">
        Order By
        <span class="font-bold" th:text="${order.orderedBy.fullName}"></span>
    </h1>


    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <!-- Items -->
        <div class="lg:col-span-2 py-4 px-8">
            <!-- Header -->
            <div class="sm:grid grid-cols-12 text-xs tracking-[0.1em] uppercase text-gray-400 pb-4 border-b border-gray-100 pb-4 mb-2 font-medium">
                <span class="col-span-6">Product</span>
                <span class="col-span-2 text-center">Size</span>
                <span class="col-span-2 text-center">P.Qty</span>
                <span class="col-span-2 text-right">Total</span>
            </div>

            <!-- Items Detail -->
            <div th:each="orderDetail : ${orderDetails}" class="divide-y divide-gray-100">
                <div class="py-6 grid grid-cols-12 gap-4 items-center">
                    <div class="col-span-12 sm:col-span-6 flex gap-4">
                        <div class="w-20 h-24 bg-gray-100 flex-shrink-0 overflow-hidden">
                            <!-- Image -->
                            <!-- If product was added before -->
                            <img th:if="${#strings.startsWith(orderDetail.product.imageUrl, 'images')}"
                                 th:src="@{'/' + ${orderDetail.product.imageUrl}}"
                                 alt="Product Image"
                                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-600"
                            />

                            <!-- If product was uploaded by user -->
                            <img th:if="${!#strings.startsWith(orderDetail.product.imageUrl, 'images')}"
                                 th:src="@{'/uploads/products/' + ${orderDetail.product.productId} + '/' + ${orderDetail.product.imageUrl}}"
                                 alt="Product Image"
                                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-600"
                            />
                        </div>

                        <div>
                            <h3 th:text="${orderDetail.product.name}" class="text-sm tracking-wide mb-1"></h3>
                            <p class="text-xs text-gray-400 mb-0.5">
                                Set · $<span th:text="${orderDetail.product.price}"></span>
                            </p>

                            <p th:if="${orderDetail.logoText != null and !orderDetail.logoText.isEmpty()}"
                               class="text-xs text-gray-400 italic">
                                "<span th:text="${orderDetail.customLogoText}">Custom</span>"
                            </p>

                        </div>
                    </div>

                    <!-- Size -->
                    <div class="col-span-4 sm:col-span-2 text-center">
                        <p class="text-xs text-gray-400 sm:hidden mb-1">Sizes</p>
                        <div class="flex flex-col items-center gap-1">
                                <span class="text-xs">His:
                                    <span th:text="${orderDetail.maleSize}"></span>
                                </span>
                            <span class="text-xs">Her:
                                    <span th:text="${orderDetail.femaleSize}"></span>
                                </span>
                        </div>
                    </div>

                    <div class="col-span-4 sm:col-span-2 flex justify-center">
                        <div class="flex items-center">
                                        <span th:text="${orderDetail.pairQuantity}"
                                              class="w-8 h-8 flex items-center justify-center text-sm">1</span>
                        </div>
                    </div>

                    <!-- Price -->
                    <div class="col-span-4 sm:col-span-2 text-right">
                        <p class="text-sm">
                            $<span th:text="${orderDetail.subTotal}"></span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Payment -->
        <div>
            <div class="bg-gray-50  p-8 sticky top-24">
                <h2 class="text-sm tracking-[0.15em] uppercase mb-8 font-bold">
                    Payment #<span th:text="${payment.paymentId}"></span>
                </h2>

                <div class="space-y-3 mb-4">
                    <div class="flex justify-between text-xs">
                        <span class="text-gray-500">Method</span>
                        <span th:if="${payment.paymentMethod.toString() == 'COD'}"
                              class="font-medium text-emerald-700 ">
                                        <span th:text="${payment.paymentMethod.toString()}"></span>
                                    </span>

                        <span th:if="${payment.paymentMethod.toString() == 'CARD'}"
                              class="font-medium text-blue-700 ">
                                          <span th:text="${payment.paymentMethod.toString()}"></span>
                                    </span>
                    </div>
                </div>

                <div class="space-y-3 mb-4">
                    <div class="flex justify-between text-xs">
                        <span class="text-gray-500">Date</span>
                        <span th:text="${payment.getFormattedCreatedAt()}"
                              class="font-medium">
                                    </span>
                    </div>
                </div>

                <div class="space-y-3 mb-4">
                    <div class="flex justify-between text-xs">
                        <span class="text-gray-500">Status</span>
                        <div class="flex justify-center items-center gap-2">
                            <input type="hidden" name="orderId" th:value="${order.orderId}">

                            <select name="paymentStatus"
                                    disabled
                                    class="text-xs rounded-full px-3 py-1 appearance-none border-0 font-medium text-center "
                                    th:classappend="
                                                    *{payment.paymentStatus.toString() == 'PENDING'} ? 'bg-emerald-100 text-emerald-700' :
                                                    (*{payment.paymentStatus.toString() == 'REFUNDED'} ? 'bg-blue-100 text-blue-700' :
                                                    (*{payment.paymentStatus.toString() == 'PAID'} ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700'))
                                                ">

                                <option value="PENDING"
                                        class="bg-emerald-100 text-emerald-700"
                                        th:selected="${payment.paymentStatus.toString() == 'PENDING'}">
                                    PENDING
                                </option>

                                <option value="REFUNDED"
                                        class="bg-blue-100 text-blue-700"
                                        th:selected="${payment.paymentStatus.toString() == 'REFUNDED'}">
                                    REFUNDED
                                </option>

                                <option value="PAID"
                                        class="bg-amber-100 text-amber-700"
                                        th:selected="${payment.paymentStatus.toString() == 'PAID'}">
                                    PAID
                                </option>

                                <option value="FAILED"
                                        class="bg-red-100 text-red-700"
                                        th:selected="${payment.paymentStatus.toString() == 'FAILED'}">
                                    FAILED
                                </option>
                            </select>
                        </div>
                    </div>
                </div>


                <div class="border-t border-gray-200 pt-4 mb-6">
                    <div class="flex justify-between">
                        <span class="text-sm">Total</span>
                        <span class="text-lg font-bold">
                                        $<span th:text="${payment.totalAmount}"></span>
                                    </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- Footer -->
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
