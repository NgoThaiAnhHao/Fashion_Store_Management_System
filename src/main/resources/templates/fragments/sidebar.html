<!-- Sidebar -->
<aside th:fragment="sidebar"
       class="sidebar fixed inset-y-0 left-0 z-40 w-64 flex flex-col
              bg-[#E5E7EB] text-black
              border-r border-gray-400
              transition-transform duration-300 ease-in-out
              lg:relative translate-x-0 font-bold">

    <!-- Logo -->
    <div class="flex items-center gap-3 px-5 h-16 border-b border-gray-400 flex-shrink-0">
        <div class="min-w-0">
            <div class="text-sm font-black tracking-wide text-black">
                FashionStore
            </div>

            <div class="text-[10px] text-black tracking-widest uppercase font-black">
                Admin Panel
            </div>
        </div>
    </div>

    <!-- Role badge -->
    <div class="px-4 py-3 border-b border-gray-400 flex-shrink-0">
        <th:block th:if="${session.currentUser != null and session.currentUser.getRoles() != null and session.currentUser.getRoles().getRoleName() != null}">
            <span th:text="${session.currentUser.getRoles().getRoleName().toString()}"
                  class="inline-flex items-center gap-1.5 px-2.5 py-1 bg-gray-300 text-black text-[10px] font-black tracking-widest uppercase rounded-md">
                <span class="w-1.5 h-1.5 rounded-full bg-black animate-pulse"></span>
            </span>
        </th:block>
    </div>

    <!-- Nav -->
    <nav class="flex-1 overflow-y-auto px-3 py-4 space-y-5"
         style="scrollbar-width: none">

        <!-- Overview -->
        <div>
            <div class="px-2 mb-1.5 text-[10px] font-black tracking-widest uppercase text-black">
                Overview
            </div>

            <div class="space-y-0.5">
                <a th:href="@{/fashion-store/dashboard}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-xs font-bold transition-all group text-black hover:bg-gray-400 hover:text-black">

                    <svg xmlns="http://www.w3.org/2000/svg"
                         width="16"
                         height="16"
                         viewBox="0 0 24 24"
                         fill="none"
                         stroke="currentColor"
                         stroke-width="2"
                         stroke-linecap="round"
                         stroke-linejoin="round"
                         class="lucide lucide-layout-dashboard-icon lucide-layout-dashboard text-black">
                        <rect width="7" height="9" x="3" y="3" rx="1"/>
                        <rect width="7" height="5" x="14" y="3" rx="1"/>
                        <rect width="7" height="9" x="14" y="12" rx="1"/>
                        <rect width="7" height="5" x="3" y="16" rx="1"/>
                    </svg>

                    <span class="truncate text-black group-hover:text-black">
                        Dashboard
                    </span>
                </a>
            </div>
        </div>

        <!-- User & Access -->
        <div th:if="${session.currentUser != null and session.currentUser.getRoles() != null and session.currentUser.getRoles().getSeparatedRoleName() == 'ADMIN'}">
            <div class="px-2 mb-1.5 text-[10px] font-black tracking-widest uppercase text-black">
                User & Access
            </div>

            <div class="space-y-0.5">
                <a th:href="@{/fashion-store/users/users-management}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-xs font-bold transition-all group text-black hover:bg-gray-400 hover:text-black">

                    <span class="truncate text-black group-hover:text-black">
                        User Management
                    </span>
                </a>
            </div>
        </div>

        <!-- Catalog -->
        <div>
            <div class="px-2 mb-1.5 text-[10px] font-black tracking-widest uppercase text-black">
                Catalog
            </div>

            <div class="space-y-0.5">
                <a th:href="@{/fashion-store/products}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-xs font-bold transition-all group text-black hover:bg-gray-400 hover:text-black">

                    <span class="truncate text-black group-hover:text-black">
                        Product Management
                    </span>
                </a>

                <a th:href="@{/fashion-store/categories}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-xs font-bold transition-all group text-black hover:bg-gray-400 hover:text-black">

                    <span class="truncate text-black group-hover:text-black">
                        Category Management
                    </span>
                </a>
            </div>
        </div>

        <!-- Operations -->
        <div>
            <div class="px-2 mb-1.5 text-[10px] font-black tracking-widest uppercase text-black">
                Operations
            </div>

            <div class="space-y-0.5">
                <a th:href="@{/fashion-store/orders}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-xs font-bold transition-all group text-black hover:bg-gray-400 hover:text-black">

                    <span class="truncate text-black group-hover:text-black">
                        Order Management
                    </span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Footer -->
    <div class="border-t border-gray-400 p-3 space-y-0.5 flex-shrink-0">

        <!-- Sign out -->
        <div class="px-3 py-2 flex items-center gap-3">
            <form th:action="@{/fashion-store/auth/logout}" method="post" class="w-full">
                <button type="submit"
                        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-black font-black hover:bg-gray-400 hover:text-black transition-all">

                    <svg xmlns="http://www.w3.org/2000/svg"
                         width="24"
                         height="24"
                         viewBox="0 0 24 24"
                         fill="none"
                         stroke="currentColor"
                         stroke-width="2"
                         stroke-linecap="round"
                         stroke-linejoin="round"
                         class="lucide lucide-log-out-icon lucide-log-out pr-2 text-black">
                        <path d="m16 17 5-5-5-5"/>
                        <path d="M21 12H9"/>
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    </svg>

                    SIGN OUT
                </button>
            </form>
        </div>

        <!-- User info -->
        <div th:if="${session.currentUser != null}" class="px-3 py-2 mt-2 flex items-center gap-3">

            <!-- Avatar -->
            <div class="w-7 h-7 rounded-full overflow-hidden flex items-center justify-center bg-white border border-gray-400 flex-shrink-0">

                <!-- Use default avatar if user profile photo is null -->
                <div th:if="${session.currentUser.avatarUrl == null}"
                     th:text="${session.currentUser.getFirstCharOfFullName()}"
                     class="w-7 h-7 rounded-full bg-white flex items-center justify-center text-[11px] font-black text-black flex-shrink-0">
                </div>

                <!-- Use user's avatar if user profile photo is not null -->
                <img th:if="${session.currentUser.avatarUrl != null}"
                     th:src="@{'/uploads/users/' + ${session.currentUser.userId} + '/' + ${session.currentUser.avatarUrl}}"
                     alt="Profile photo"
                     class="w-full h-full object-cover"/>
            </div>

            <!-- User name + email -->
            <div class="min-w-0">
                <div th:text="${session.currentUser.fullName}"
                     class="text-xs font-black text-black truncate">
                </div>

                <div th:text="${session.currentUser.email}"
                     class="text-[10px] text-gray-800 truncate font-medium">
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const currentPath = window.location.pathname;
            const sidebarLinks = document.querySelectorAll(".sidebar a");

            sidebarLinks.forEach(function (link) {
                const linkPath = new URL(link.href).pathname;

                if (currentPath === linkPath || currentPath.startsWith(linkPath + "/")) {
                    link.classList.add("sidebar-active");
                }
            });
        });
    </script>
</aside>
