<!-- Sidebar -->
<!-- ${sidebarOpen ? "translate-x-0" : "-translate-x-full"-->
<!-- Backdrop -->
<aside th:fragment="sidebar" class="sidebar fixed inset-y-0 left-0 z-40 w-64 flex flex-col
            bg-[#1F1B18] text-[#F5F1EB]
            transition-transform duration-300 ease-in-out
            lg:relative translate-x-0 font-bold">

    <!-- Logo -->
    <div class="flex items-center gap-3 px-5 h-16 border-b border-[#D8C3A5]/15 flex-shrink-0">
        <div class="min-w-0">
            <div class="text-sm font-bold tracking-wide text-[#F5F1EB]">
                FashionStore
            </div>
            <div class="text-[10px] text-[#D8C3A5]/70 tracking-widest uppercase">
                Admin Panel
            </div>
        </div>
    </div>

    <!-- Role badge -->
    <div class="px-4 py-3 border-b border-[#D8C3A5]/15 flex-shrink-0">
                  <span th:text="${session.currentUser.getRoles().getRoleName().toString()}"
                        class="inline-flex items-center gap-1.5 px-2.5 py-1 bg-[#D8C3A5]/15 text-[#D8C3A5] text-[10px] font-bold tracking-widest uppercase rounded-md">
                      <span class="w-1.5 h-1.5 rounded-full bg-[#D8C3A5] animate-pulse"></span>
                  </span>
    </div>

    <!-- Nav -->
    <nav class="flex-1 overflow-y-auto px-3 py-4 space-y-5"
         style="scrollbar-width: none">
        <!-- Overview -->
        <div>
            <div class="px-2 mb-1.5 text-[10px] font-bold tracking-widest uppercase text-[#D8C3A5]/55">
                Overview
            </div>

            <div class="space-y-0.5">
                <a th:href="@{/fashion-store/dashboard}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-xs font-medium transition-all group text-[#F5F1EB]/60 hover:bg-[#F5F1EB]/10 hover:text-[#F5F1EB]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layout-dashboard-icon lucide-layout-dashboard"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                    <span class="truncate text-[#F5F1EB]/45 group-hover:text-[#F5F1EB]/80">Dashboard</span>
                </a>
            </div>
        </div>

        <!-- User & Access -->
        <div th:if="${session.currentUser.getRoles().getSeparatedRoleName() == 'ADMIN'}">
            <div class="px-2 mb-1.5 text-[10px] font-bold tracking-widest uppercase text-[#D8C3A5]/55">
                User & Access
            </div>

            <div class="space-y-0.5">
                <a th:href="@{/fashion-store/users/users-management}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-xs font-medium transition-all group text-[#F5F1EB]/60 hover:bg-[#F5F1EB]/10 hover:text-[#F5F1EB]">
                    <span class="truncate text-[#F5F1EB]/45 group-hover:text-[#F5F1EB]/80">User Management</span>
                </a>
            </div>
        </div>

        <!-- Catalog -->
        <div>
            <div class="px-2 mb-1.5 text-[10px] font-bold tracking-widest uppercase text-[#D8C3A5]/55">
                Catalog
            </div>

            <div class="space-y-0.5">
                <a th:href="@{/fashion-store/products}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-xs font-medium transition-all group text-[#F5F1EB]/60 hover:bg-[#F5F1EB]/10 hover:text-[#F5F1EB]">
                    <span class="truncate text-[#F5F1EB]/45 group-hover:text-[#F5F1EB]/80">Product Management</span>
                </a>

                <a th:href="@{/fashion-store/categories}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-xs font-medium transition-all group text-[#F5F1EB]/60 hover:bg-[#F5F1EB]/10 hover:text-[#F5F1EB]">
                    <span class="truncate text-[#F5F1EB]/45 group-hover:text-[#F5F1EB]/80">Category Management</span>
                </a>
            </div>
        </div>

        <!-- Operations -->
        <div>
            <div class="px-2 mb-1.5 text-[10px] font-bold tracking-widest uppercase text-[#D8C3A5]/55">
                Operations
            </div>

            <div class="space-y-0.5">
                <a th:href="@{/fashion-store/orders}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-xs font-medium transition-all group text-[#F5F1EB]/60 hover:bg-[#F5F1EB]/10 hover:text-[#F5F1EB]">
                    <span class="truncate text-[#F5F1EB]/45 group-hover:text-[#F5F1EB]/80">Order Management</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Footer -->
    <div class="border-t border-[#D8C3A5]/15 p-3 space-y-0.5 flex-shrink-0">
        <div class="px-3 py-2 flex items-center gap-3">
            <form th:action="@{/fashion-store/auth/logout}" method="post" class="w-full">
                <button type="submit"
                        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-[#F5F1EB]/60 hover:bg-[#D8C3A5]/10 hover:text-[#D8C3A5] transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg"
                         width="24" height="24" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                         class="lucide lucide-log-out-icon lucide-log-out pr-2">
                        <path d="m16 17 5-5-5-5"/>
                        <path d="M21 12H9"/>
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    </svg>
                    SIGN OUT
                </button>
            </form>
        </div>

        <div class="px-3 py-2 mt-2 flex items-center gap-3">
            <div class="w-7 h-7 rounded-full bg-[#D8C3A5] flex items-center justify-center text-[11px] font-bold text-[#1F1B18] flex-shrink-0">
                <div class="w-7 h-7 rounded-full overflow-hidden flex items-center justify-center bg-white">
                    <!-- Use default avatar if user profile photo is null -->
                    <div th:if="${currentUser != null and currentUser.avatarUrl == null}"
                         th:text="${currentUser.getFirstCharOfFullName()}"
                         class="w-7 h-7 rounded-full bg-[#D8C3A5] flex items-center justify-center text-[11px] font-bold text-[#1F1B18] flex-shrink-0">
                    </div>

                    <!-- Use user's avatar if user profile photo is not null -->
                    <img th:if="${currentUser != null and currentUser.avatarUrl != null}"
                         th:src="@{'/uploads/users/' + ${currentUser.userId} + '/' + ${currentUser.avatarUrl}}"
                         alt="Profile photo"
                         class="object-cover"
                    />
                </div>
            </div>

            <div class="min-w-0">
                <div th:if="${session.currentUser != null}" th:text="${session.currentUser.fullName}" class="text-xs font-semibold text-[#F5F1EB] truncate">
                </div>

                <div th:if="${session.currentUser != null}" th:text="${session.currentUser.email}" class="text-[10px] text-[#D8C3A5]/60 truncate font-normal">
                </div>
            </div>
        </div>
    </div>
</aside>
