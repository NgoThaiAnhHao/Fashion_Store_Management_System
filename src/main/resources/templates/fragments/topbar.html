<header th:fragment="topbar" class="w-100 h-16 bg-[#E5DDD2]/50 border-b border-[#222222]/10 flex items-center gap-4 px-6 flex-shrink-0 z-20">
    <!--            <button onclick="openSideBar()" class="text-[#777777] hover:text-[#222222]">-->
    <!--                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-panel-left-open-icon lucide-panel-left-open"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/><path d="m14 9 3 3-3 3"/></svg>            -->
    <!--            </button>-->
    <div class="ml-auto flex items-center gap-2">
    </div>

    <div class="relative group">
        <!-- Profile Button -->
        <button class="flex items-center gap-3  px-3 py-2 rounded-full transition-all duration-200">

            <!-- Avatar -->
            <div class="w-8 h-8 rounded-full border border-[#D8C3A5] overflow-hidden flex items-center justify-center bg-white">
                <!-- Use default avatar if user profile photo is null -->

                <!-- Use user's avatar if user profile photo is not null -->
                <img
                        alt="Profile photo"
                        class="object-cover"
                />
            </div>

            <!-- User info -->
            <div class="hidden md:flex flex-col items-start leading-tight">
                                <span class="text-xs text-[#777777]">
                                    Welcome Back,
                                </span>
                <span class="text-sm font-medium text-[#222222]"></span>
            </div>

            <!-- Arrow -->
            <svg xmlns="http://www.w3.org/2000/svg"
                 class="w-4 h-4 text-[#777777]"
                 fill="none"
                 viewBox="0 0 24 24"
                 stroke="currentColor"
                 stroke-width="2">
                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      d="m6 9 6 6 6-6"/>
            </svg>
        </button>

        <!-- Dropdown -->
        <div class="absolute right-0 mt-3 w-60 bg-white border border-[#E8DDD0] rounded-md shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 overflow-hidden z-50">
            <a th:href="@{/orders}"
               class="flex items-center px-4 py-3 text-xs text-[#222222] hover:bg-[#F5F1EB] transition-colors duration-150">

                <svg xmlns="http://www.w3.org/2000/svg"
                     width="24" height="24" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     class="lucide lucide-handbag-icon lucide-handbag pr-2">
                    <path d="M2.048 18.566A2 2 0 0 0 4 21h16a2 2 0 0 0 1.952-2.434l-2-9A2 2 0 0 0 18 8H6a2 2 0 0 0-1.952 1.566z"/>
                    <path d="M8 11V6a4 4 0 0 1 8 0v5"/>
                </svg>

                My Orders
            </a>

            <a th:href="@{/fashion-store/users/my-profile}"
               class="flex items-center px-4 py-3 text-xs text-[#222222] hover:bg-[#F5F1EB] transition-colors duration-150">
                <svg xmlns="http://www.w3.org/2000/svg"
                     width="24" height="24" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     class="lucide lucide-square-user-icon lucide-square-user pr-2">
                    <rect width="18" height="18" x="3" y="3" rx="2"/>
                    <circle cx="12" cy="10" r="3"/>
                    <path d="M7 21v-2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"/>
                </svg>
                My Profile
            </a>

            <form th:action="@{/fashion-store/auth/logout}" method="post">
                <button type="submit"
                        class="w-full text-left px-4 py-3 text-xs text-red-500 hover:bg-red-50 transition-colors duration-150 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg"
                         width="24" height="24" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                         class="lucide lucide-log-out-icon lucide-log-out pr-2">
                        <path d="m16 17 5-5-5-5"/>
                        <path d="M21 12H9"/>
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    </svg>
                    Logout
                </button>
            </form>
        </div>
    </div>

</header>
