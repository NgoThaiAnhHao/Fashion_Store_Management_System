<div class="min-h-screen bg-background" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!-- NAV BAR -->
    <header  th:fragment="topbar" class="top-0 left-0 right-0 z-50 bg-[#E5E7EB]/50 backdrop-blur-md border-b border-[rgba(34,34,34,0.08)]">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">

            <div class="flex items-center justify-between h-18" style="height: 60px">
                <!-- Center logo -->
                <div class="flex flex-col items-center gap-0.5 group absolute left-1/2 -translate-x-1/2">
                </div>
                <!-- End center logo -->

                <!-- Right actions -->
                <div class="hidden md:flex items-center gap-8 flex-1 justify-end">

                    <!-- Notification Icon (Only for ROLE_CUSTOMER) -->
                    <div sec:authorize="hasRole('ROLE_CUSTOMER')" class="relative group">
                        <button id="notification-bell-topbar"
                                class="relative flex items-center justify-center p-2 rounded-full hover:bg-gray-100 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg"
                                 width="24"
                                 height="24"
                                 viewBox="0 0 24 24"
                                 fill="none"
                                 stroke="currentColor"
                                 stroke-width="2"
                                 stroke-linecap="round"
                                 stroke-linejoin="round"
                                 class="lucide lucide-bell-icon lucide-bell w-5 h-5 text-[#111111]">
                                <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
                            </svg>
                            <span id="unread-notification-count-badge-topbar"
                                  th:if="${unreadNotificationCount != null and unreadNotificationCount > 0}"
                                  th:text="${unreadNotificationCount}"
                                  class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold rounded-full min-w-[18px] h-[18px] flex items-center justify-center">
                            </span>
                        </button>

                        <!-- Notification Dropdown -->
                        <div id="notification-dropdown-topbar"
                             class="absolute right-0 mt-3 w-80 bg-white border border-[#E5E7EB] rounded-md shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 overflow-hidden z-50 hidden">
                            <div class="p-4 border-b border-gray-200">
                                <h3 class="font-bold text-sm">Notifications</h3>
                            </div>
                            <div id="notification-list-topbar" class="max-h-80 overflow-y-auto divide-y divide-gray-100">
                                <!-- Notifications will be loaded here by JavaScript -->
                                <div class="p-4 text-gray-500 text-sm text-center">No notifications yet.</div>
                            </div>
                        </div>
                    </div>

                    <!-- Menu Profile -->
                    <div sec:authorize="isAuthenticated()" class="relative group">
                        <!-- Profile Button -->
                        <button class="flex items-center gap-3  px-3 py-2 rounded-full transition-all duration-200">

                            <!-- Avatar -->
                            <div class="w-8 h-8 rounded-full border border-[#D6C4AA] overflow-hidden flex items-center justify-center bg-white">
                                <!-- Use default avatar if user profile photo is null -->
                                <div th:if="${currentUser != null and currentUser.avatarUrl == null}"
                                     th:text="${currentUser.getFirstCharOfFullName()}"
                                     class="w-7 h-7 rounded-full bg-[#D6C4AA] flex items-center justify-center text-[11px] font-bold text-[#1F1B18] flex-shrink-0">
                                </div>

                                <!-- Use user's avatar if user profile photo is not null -->
                                <img th:if="${currentUser != null and currentUser.avatarUrl != null}"
                                     th:src="@{'/uploads/users/' + ${currentUser.userId} + '/' + ${currentUser.avatarUrl}}"
                                     alt="Profile photo"
                                     class="object-cover"
                                />
                            </div>

                            <!-- User info -->
                            <div class="hidden md:flex flex-col items-start leading-tight">
                                <span th:text="${currentUser.fullName}" class="text-sm font-medium text-[#0B0B0B]"></span>
                            </div>

                            <!-- Arrow -->
                            <svg xmlns="http://www.w3.org/2000/svg"
                                 class="w-4 h-4 text-[#777777]"
                                 fill="none"
                                 viewBox="0 0 24 24"
                                 stroke="currentColor"
                                 stroke-width="2">
                                <path stroke-linecap="round"
                                      stroke-linejoin="round"
                                      d="m6 9 6 6 6-6"/>
                            </svg>
                        </button>

                        <!-- Dropdown -->
                        <div class="absolute right-0 mt-3 w-60 bg-white border border-[#E5E7EB] rounded-md shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 overflow-hidden">
                            <form th:action="@{/fashion-store/auth/logout}" method="post">
                                <button type="submit"
                                        class="w-full text-left px-4 py-3 text-xs text-red-500 hover:bg-red-50 transition-colors duration-150 flex items-center">
                                    <svg xmlns="http://www.w3.org/2000/svg"
                                         width="24" height="24" viewBox="0 0 24 24" fill="none"
                                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                         class="lucide lucide-log-out-icon lucide-log-out pr-2">
                                        <path d="m16 17 5-5-5-5"/>
                                        <path d="M21 12H9"/>
                                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                    </svg>
                                    Logout
                                </button>
                            </form>
                        </div>
                    </div>

                </div>
                <!-- End right actions -->

            </div>

        </div>
    </header>
    <!-- END NAV BAR -->

</div>

<script>
    // --- Notification JavaScript for Topbar ---
    document.addEventListener('DOMContentLoaded', function () {
        const notificationBellTopbar = document.getElementById('notification-bell-topbar');
        // Only proceed if the notification bell exists (i.e., user is a customer)
        if (!notificationBellTopbar) {
            return;
        }

        const notificationDropdownTopbar = document.getElementById('notification-dropdown-topbar');
        const notificationListTopbar = document.getElementById('notification-list-topbar');
        const unreadNotificationCountBadgeTopbar = document.getElementById('unread-notification-count-badge-topbar');

        let dropdownVisibleTopbar = false;

        function fetchNotificationsTopbar() {
            fetch('/fashion-store/api/notifications')
                .then(response => {
                    if (!response.ok) {
                        if (response.status === 401) { // Unauthorized
                            console.log('User not logged in, not fetching notifications for topbar.');
                            return [];
                        }
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(notifications => {
                    notificationListTopbar.innerHTML = ''; // Clear previous notifications
                    if (notifications.length === 0) {
                        notificationListTopbar.innerHTML = '<div class="p-4 text-gray-500 text-sm text-center">No notifications yet.</div>';
                    } else {
                        notifications.forEach(notification => {
                            const notificationItem = document.createElement('div');
                            notificationItem.classList.add('p-4', 'flex', 'items-start', 'gap-3', 'hover:bg-gray-50');
                            if (!notification.read) {
                                notificationItem.classList.add('bg-blue-50');
                            }

                            let iconSvg = '';
                            let iconColorClass = '';
                            if (notification.type === 'ORDER_CONFIRMED' || notification.type === 'PAYMENT_SUCCESS') {
                                iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-check-circle"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>';
                                iconColorClass = 'text-green-600';
                            } else if (notification.type === 'PAYMENT_REQUIRED') {
                                iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>';
                                iconColorClass = 'text-blue-600';
                            } else {
                                iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-info"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>';
                                iconColorClass = 'text-blue-600';
                            }

                            notificationItem.innerHTML = `
    <div class="flex-shrink-0 mt-1 ${iconColorClass}">
        ${iconSvg}
    </div>

    <div class="flex-grow">
        <a href="${notification.orderDetailUrl || `/fashion-store/order-detail/${notification.orderId}`}"
           class="block hover:opacity-80 transition">
            <h4 class="font-semibold text-sm ${notification.read ? 'text-gray-800' : 'text-blue-800'}">
                ${notification.title}
                ${!notification.read ? '<span class="ml-2 px-2 py-0.5 bg-blue-500 text-white text-xs rounded-full">New</span>' : ''}
            </h4>

            <p class="text-sm mt-1 ${notification.read ? 'text-gray-600' : 'text-blue-700'}">
                ${notification.message}
            </p>

            ${notification.productNames ? `
                <p class="text-xs text-gray-500 mt-1">
                    Product: <span class="font-semibold">${notification.productNames}</span>
                </p>
            ` : ''}

            <p class="text-xs text-gray-400 mt-2">
                ${new Date(notification.createdAt).toLocaleString()}
                ${notification.orderId ? ` - Order #${notification.orderId}` : ''}
            </p>
        </a>

        ${notification.paymentRequired && notification.paymentUrl ? `
            <a href="${notification.paymentUrl}"
               class="inline-flex items-center justify-center mt-3 px-4 py-2 bg-black text-white text-xs font-bold uppercase tracking-[0.12em] rounded hover:bg-gray-800 transition-colors">
                Payment
            </a>
        ` : ''}

        ${!notification.read ? `
            <button class="mark-as-read-btn-topbar mt-2 text-xs text-blue-500 hover:underline" data-id="${notification.id}">
                Mark as Read
            </button>
        ` : ''}
    </div>
`;
                            notificationListTopbar.appendChild(notificationItem);
                        });

                        // Add event listeners for "Mark as Read" buttons using event delegation
                        notificationListTopbar.addEventListener('click', function(event) {
                            if (event.target.classList.contains('mark-as-read-btn-topbar')) {
                                event.preventDefault();
                                const notificationId = event.target.dataset.id;
                                markNotificationAsReadTopbar(notificationId);
                            }
                        });
                    }
                })
                .catch(error => {
                    console.error('Error fetching notifications for topbar:', error);
                    notificationListTopbar.innerHTML = '<div class="p-4 text-red-500 text-sm text-center">Error loading notifications.</div>';
                });
        }

        function fetchUnreadCountTopbar() {
            fetch('/fashion-store/api/notifications/unread-count')
                .then(response => {
                    if (!response.ok) {
                        if (response.status === 401) { // Unauthorized
                            console.log('User not logged in, not fetching unread count for topbar.');
                            return 0;
                        }
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(count => {
                    if (count > 0) {
                        unreadNotificationCountBadgeTopbar.textContent = count;
                        unreadNotificationCountBadgeTopbar.classList.remove('hidden');
                    } else {
                        unreadNotificationCountBadgeTopbar.classList.add('hidden');
                    }
                })
                .catch(error => {
                    console.error('Error fetching unread notification count for topbar:', error);
                    unreadNotificationCountBadgeTopbar.classList.add('hidden');
                });
        }

        function markNotificationAsReadTopbar(notificationId) {
            fetch(`/fashion-store/api/notifications/mark-as-read/${notificationId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to mark notification as read in topbar');
                    }
                    return response.json();
                })
                .then(data => {
                    console.log(data.message);
                    fetchNotificationsTopbar(); // Refresh list
                    fetchUnreadCountTopbar(); // Refresh count
                })
                .catch(error => {
                    console.error('Error marking notification as read in topbar:', error);
                    alert('Failed to mark notification as read.');
                });
        }

        notificationBellTopbar.addEventListener('click', function (event) {
            event.preventDefault();
            dropdownVisibleTopbar = !dropdownVisibleTopbar;
            if (dropdownVisibleTopbar) {
                notificationDropdownTopbar.classList.remove('hidden');
                fetchNotificationsTopbar();
            } else {
                notificationDropdownTopbar.classList.add('hidden');
            }
        });

        // Close dropdown if clicked outside
        document.addEventListener('click', function (event) {
            if (!notificationBellTopbar.contains(event.target) && !notificationDropdownTopbar.contains(event.target)) {
                notificationDropdownTopbar.classList.add('hidden');
                dropdownVisibleTopbar = false;
            }
        });

        // Initial fetch of unread count on page load
        fetchUnreadCountTopbar();
    });
</script>
