<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PayPal Payment | Fashion Store</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link th:href="@{/css/fonts.css}" rel="stylesheet"/>
    <link th:href="@{/css/globals.css}" rel="stylesheet"/>
    <link th:href="@{/css/index.css}" rel="stylesheet"/>
    <link th:href="@{/css/theme.css}" rel="stylesheet"/>

    <!-- PayPal SDK -->
    <script th:src="@{'https://www.paypal.com/sdk/js'(client-id=${paypalClientId}, currency='USD')}"></script>
</head>

<body class="bg-white text-black">
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="h-[72px]"></div>

<main class="max-w-3xl mx-auto px-6 py-12">
    <div class="border border-gray-200 rounded-xl p-8 shadow-sm">
        <p class="text-xs uppercase tracking-[0.2em] text-gray-400 mb-2">
            Online Payment
        </p>

        <h1 class="text-2xl font-bold mb-4">
            Pay for Order #<span th:text="${orderId}"></span>
        </h1>

        <p class="text-gray-600 mb-8">
            Total amount:
            <strong>
                $<span th:text="${amount}"></span>
            </strong>
        </p>

        <div id="paypal-button-container" class="mt-6 min-h-[80px]"></div>

        <p id="payment-message" class="mt-6 text-sm text-red-500"></p>
    </div>
</main>

<script th:inline="javascript">
    const localOrderId = /*[[${orderId}]]*/ 0;

    console.log("PayPal order id:", localOrderId);

    function showMessage(message) {
        document.getElementById('payment-message').innerText = message;
    }

    if (typeof paypal === 'undefined') {
        showMessage('PayPal SDK could not be loaded. Please check your PayPal Client ID.');
    } else {
        paypal.Buttons({
            createOrder: async function () {
                showMessage('Creating your secure PayPal order...');

                const response = await fetch(`/fashion-store/api/paypal/orders/${localOrderId}`, {
                    method: 'POST',
                    headers: { 'Accept': 'application/json' }
                });
                const data = await readJsonResponse(response);

                if (!response.ok) {
                    throw new Error(data.message || 'The payment order could not be created.');
                }
                if (data.status === 'ALREADY_PAID' && data.redirectUrl) {
                    window.location.href = data.redirectUrl;
                    throw new Error('This order has already been paid.');
                }
                if (!data.id) {
                    throw new Error('PayPal did not return an order ID. Please try again.');
                }

                showMessage('');
                return data.id;
            },

            onApprove: async function (data) {
                showMessage('Confirming your payment...');

                const response = await fetch(`/fashion-store/api/paypal/orders/${localOrderId}/capture/${data.orderID}`, {
                    method: 'POST',
                    headers: { 'Accept': 'application/json' }
                });
                const result = await readJsonResponse(response);

                if (!response.ok) {
                    throw new Error(result.message || 'Payment could not be completed.');
                }
                if (result.status !== 'COMPLETED' || !result.redirectUrl) {
                    throw new Error(result.message || 'Payment was not completed.');
                }

                window.location.href = result.redirectUrl;
            },

            onError: function (err) {
                console.error(err);
                showMessage(err && err.message
                    ? err.message
                    : 'PayPal payment error. Please try again.');
            }
        }).render('#paypal-button-container');
    }

    async function readJsonResponse(response) {
        const contentType = response.headers.get('content-type') || '';
        if (!contentType.includes('application/json')) {
            throw new Error(response.status === 401 || response.status === 403
                ? 'Your session has expired. Please log in and try again.'
                : 'The server returned an invalid payment response.');
        }
        return response.json();
    }
</script>


</body>
</html>
