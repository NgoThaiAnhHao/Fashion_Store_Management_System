<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link th:href="@{/css/fonts.css}" rel="stylesheet" />
  <link th:href="@{/css/globals.css}" rel="stylesheet" />
  <link th:href="@{/css/index.css}" rel="stylesheet" />
  <link th:href="@{/css/theme.css}" rel="stylesheet" />

  <!-- Link Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>

<div class="min-h-screen flex">
  <!-- Left Form -->
  <div class="w-full lg:w-1/2 flex flex-col px-8 lg:px-24 py-12 bg-white">

    <!-- Logo -->
    <a th:href="@{/v1/home}" class="flex items-center gap-3 mb-20">
      <div class="w-10 h-10 bg-black flex items-center justify-center">
        <span class="text-white text-lg font-black">FS</span>
      </div>
      <span class="text-2xl font-black tracking-tight">FASHION STORE</span>
    </a>

    <!-- Title -->
    <div class="flex-1 flex flex-col justify-center max-w-md mx-auto w-full">

      <!-- Welcome message -->
      <h1 class="text-4xl font-black tracking-tighter mb-4">
        CREATE ACCOUNT
      </h1>

      <!-- Description message -->
      <p class="text-base text-gray-600 mb-6 font-light">
        Join the Fashion Store community
      </p>

      <!-- Error message after register-->
      <div th:if="${error}"
           class="text-xs bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative " role="alert">
        <span th:text="${error}"
              class="block sm:inline"></span>
      </div>

      <!-- Create Account Form -->
      <form th:action="@{/v1/auth/register}"
            th:object="${user}"
            method="POST"
              class="space-y-6 mt-6">
        <!-- Full Name -->
        <div>
          <label for="name"
                 class="block text-xs font-bold tracking-[0.2em] uppercase text-black mb-3">
            Full Name

          </label>
          <input
                  id="name"
                  name="name"
                  type="text"
                  th:field="*{fullName}"
                  placeholder="JOHN DOE"
                  class="w-full px-0 py-0 border-0 border-b-2 border-gray-200 focus:border-black focus:outline-none text-base bg-transparent transition-colors placeholder-gray-400 font-light"
          />

          <!-- Full Name Error Message-->
          <div th:if="${#fields.hasErrors('fullName')}"
               class="text-[10px] text-red-500 py-2 rounded relative font-normal tracking-[0] roboto-slab normal-case" role="alert">
            <span th:errors="*{fullName}" class="block sm:inline"></span>
          </div>
        </div>

        <!-- Email -->
        <div>
          <label for="email"
                 class="block text-xs font-bold tracking-[0.2em] uppercase text-black mb-3">
            Email
          </label>
          <input
                  id="email"
                  name="email"
                  type="email"
                  th:field="*{email}"

                  placeholder="hello@fashionstore.com"
                  class="w-full px-0 py-0 border-0 border-b-2 border-gray-200 focus:border-black focus:outline-none text-base bg-transparent transition-colors placeholder-gray-400 font-light"
          />
          <!-- Email Error Message-->
          <div th:if="${#fields.hasErrors('email')}"
               class="text-[10px] text-red-500 py-2 rounded relative font-normal tracking-[0] roboto-slab normal-case" role="alert">
            <span th:errors="*{email}" class="block sm:inline"></span>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label for="password"
                 class="block text-xs font-bold tracking-[0.2em] uppercase text-black mb-3">
            Password
          </label>
          <input
                  id="password"
                  name="password"
                  type="password"
                  th:field="*{password}"

                  placeholder="••••••••"
                  class="w-full px-0 py-0 border-0 border-b-2 border-gray-200 focus:border-black focus:outline-none text-base bg-transparent transition-colors placeholder-gray-400 font-light"
          />
          <!-- Password Error Message-->
          <div th:if="${#fields.hasErrors('password')}"
               class="text-[10px] text-red-500 py-2 rounded relative font-normal tracking-[0] roboto-slab normal-case" role="alert">
            <span th:errors="*{password}" class="block sm:inline"></span>
          </div>
        </div>

        <!-- Create Account Button -->
        <button type="submit"
                class="w-full bg-black text-white py-5 text-sm font-bold tracking-[0.2em] uppercase hover:bg-gray-900 transition-all duration-300 mt-8">
          CREATE ACCOUNT
        </button>
      </form>

      <!-- Option for Sign In -->
      <div class="mt-12 text-center">
        <p class="text-base text-gray-600 font-light">
          Already have an account?
          <a th:href="@{/v1/auth/login}"
                  class="text-black font-bold underline underline-offset-4 hover:no-underline transition-all">
            Sign in
          </a>
        </p>
      </div>
    </div>

    <!-- Policy -->
    <div class="text-xs text-gray-500 text-center mt-12 font-light">
      By continuing, you agree to our
      <span class="underline cursor-pointer hover:text-black transition-colors">Terms</span>
      <span class="underline cursor-pointer hover:text-black transition-colors">Privacy Policy</span>
    </div>
  </div>
  <!-- End Left Form -->

  <!-- Right Image -->
  <div class="hidden lg:block w-1/2 relative bg-black">
    <img
            src="https://images.unsplash.com/photo-1777917677061-7471ce48388d?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=1080"
            alt="Fashion Store"
            class="w-full h-full object-cover opacity-80"
    />

    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent">
    </div>

    <div class="absolute bottom-16 left-16 right-16 text-white">
      <p class="text-xs font-bold tracking-[0.3em] uppercase mb-4 text-white/60">SPRING 2026</p>
      <p class="text-3xl font-black tracking-tight leading-tight mb-6">
        MODERN ESSENTIALS<br />FOR THE CONFIDENT
      </p>
      <p class="text-base text-white/60 font-light">
        Premium streetwear designed in Vietnam
      </p>
    </div>
  </div>
  <!-- End Right Image -->
</div>
</body>
</html>
