<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name + ' | Fashion Store'}"></title>
    <link rel="shortcut icon" href="//cdn.hstatic.net/themes/1000184601/1001406013/14/favicon.png?v=1538" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link th:href="@{/css/fonts.css}" rel="stylesheet" />
    <link th:href="@{/css/globals.css}" rel="stylesheet" />
    <link th:href="@{/css/index.css}" rel="stylesheet" />
    <link th:href="@{/css/theme.css}" rel="stylesheet" />
</head>
<body>
<!-- Navbar -->
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="pt-20 bg-white">
    <div class="max-w-7xl mx-auto px-6 lg:px-8 py-12 lg:py-20">
        <!-- Breadcrumb -->
        <a th:href="@{/fashion-store/dashboard}"
           class="inline-flex items-center gap-2 text-xs font-bold tracking-[0.2em] uppercase text-gray-600 hover:text-black transition-colors mb-12">
            BACK TO SHOP
        </a>

        <div class="flex gap-12">
            <!-- Image gallery -->
            <div class="w-1/3 overflow-hidden">
                <div class="relative w-full border border-black border-2 overflow-hidden">
                    <!-- If product was added before -->
                    <img th:if="${#strings.startsWith(product.imageUrl, 'images')}"
                         th:src="@{'/' + ${product.imageUrl}}"
                         alt="Product Image"
                         class="w-full h-auto object-cover group-hover:scale-105 transition-transform duration-600"
                    />

                    <!-- If product was uploaded by user -->
                    <img th:if="${!#strings.startsWith(product.imageUrl, 'images')}"
                         th:src="@{'/uploads/products/' + ${product.productId} + '/' + ${product.imageUrl}}"
                         alt="Product Image"
                         class="w-full h-auto object-cover group-hover:scale-105 transition-transform duration-600"
                    />

                    <!-- Logo preview on shirt -->
                    <img id="shirtLogoPreview"
                         src=""
                         alt="Logo Preview On Shirt"
                         class="hidden absolute top-[38%] left-[38%] w-24 h-24 object-contain opacity-90 pointer-events-none">
                </div>
            </div>

            <!-- Details -->
            <div class="w-full">
                <p class="text-xs font-bold tracking-[0.3em] uppercase text-gray-500 mb-6">COUPLE SET</p>

                <h1 th:text="${product.name}" class="text-3xl font-black tracking-tighter"></h1>

                <p class="text-xl font-bold mb-10">
                    $<span th:text="${product.salePrice}" ></span>
                </p>

                <p th:text="${product.description}"
                   class="text-base text-gray-700 leading-relaxed mb-10 pb-10 border-b border-gray-200 font-light">
                </p>

                <!-- Success message after register -->
                <div th:if="${successMessage}"
                     class="text-xs bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative" role="alert">
                    <span th:text="${successMessage}" class="block sm:inline"></span>
                </div>

                <form th:action="@{/fashion-store/cart/add-to-cart/{productId}(productId=${product.productId})}"
                      th:object="${cartItem}"
                      class="space-y-10"
                      method="POST"
                      enctype="multipart/form-data">

                    <input type="hidden"
                           th:field="*{pairQuantity}"
                           id="pairQuantity"
                           value="1">

                    <!-- Male size -->
                    <div>
                        <div class="flex items-center justify-between mb-5">
                            <label class="text-xs font-bold tracking-[0.2em] uppercase">HIS SIZE</label>
                        </div>
                        <div class="flex flex-wrap gap-3">
                            <select th:field="*{maleSize}"
                                    id="hisSize"
                                    name="hisSize"
                                    class="appearance-none w-full px-6 py-3 border-2 text-base transition-all font-light border-gray-300 focus:border-black focus:outline-none">
                                <option value="S">S</option>
                                <option value="M">M</option>
                                <option value="L" selected>L</option>
                                <option value="XL">XL</option>
                                <option value="2XL">2XL</option>
                                <option value="3XL">3XL</option>
                            </select>
                        </div>
                    </div>

                    <!-- Female size -->
                    <div>
                        <div class="flex items-center justify-between mb-5">
                            <label class="text-xs font-bold tracking-[0.2em] uppercase">HER SIZE</label>
                        </div>
                        <div class="flex flex-wrap gap-3">
                            <select th:field="*{femaleSize}"
                                    id="herSize"
                                    name="herSize"
                                    class="appearance-none w-full px-6 py-3 border-2 text-base transition-all font-light border-gray-300 focus:border-black focus:outline-none">
                                <option value="S">S</option>
                                <option value="M">M</option>
                                <option value="L" selected>L</option>
                                <option value="XL">XL</option>
                                <option value="2XL">2XL</option>
                                <option value="3XL">3XL</option>
                            </select>
                        </div>
                    </div>

                    <!-- Logo text -->
                    <div>
                        <label class="block text-xs font-bold tracking-[0.2em] uppercase mb-5">
                            CUSTOM TEXT
                            <span class="text-gray-400 normal-case tracking-normal font-light">(Optional)</span>
                        </label>
                        <input
                                th:field="*{customLogoText}"
                                id="logoText"
                                name="logoText"
                                type="text"
                                placeholder="YOUR TEXT HERE"
                                maxlength="40"
                                class="w-full px-6 py-2 border-2 text-base transition-all font-light border-gray-300 focus:border-black focus:outline-none">

                        <p class="mt-3 text-xs text-gray-500 font-light">Text Length / 40 characters</p>
                    </div>

                    <!-- Upload logo image -->
                    <div>
                        <label class="block text-xs font-bold tracking-[0.2em] uppercase mb-5">
                            UPLOAD LOGO
                            <span class="text-gray-400 normal-case tracking-normal font-light">(Optional)</span>
                        </label>

                        <div class="border-2 border-dashed border-gray-300 p-8 text-center hover:border-black transition-colors">
                            <input
                                    id="customLogoImage"
                                    name="customLogoImage"
                                    type="file"
                                    accept="image/png,image/jpeg,image/jpg,image/svg+xml,image/webp"
                                    class="hidden">

                            <label for="customLogoImage" class="cursor-pointer block">
                                <div class="text-gray-400 text-sm tracking-[0.15em] uppercase font-bold">
                                    Click to upload
                                </div>
                                <p class="mt-2 text-xs text-gray-400">
                                    PNG, JPG, SVG, WEBP - Max 5MB
                                </p>
                            </label>

                            <img id="logoPreview"
                                 src=""
                                 alt="Logo Preview"
                                 class="hidden mx-auto mt-6 max-h-32 object-contain border border-gray-200 p-2">
                        </div>
                    </div>

                    <!-- Quantity + Add to cart -->
                    <div class="flex gap-4 pt-4">
                        <div class="flex items-center border-2 border-gray-300 bg-white">
                            <button type="button"
                                    id="minusBtn"
                                    class="w-12 h-12 flex items-center justify-center text-xl font-bold transition-colors hover:bg-gray-100">
                                −
                            </button>

                            <span id="quantityDisplay"
                                  class="w-12 h-12 flex items-center justify-center border-x-2 border-gray-300 text-xl font-bold">1</span>

                            <button type="button"
                                    id="plusBtn"
                                    class="w-12 h-12 flex items-center justify-center text-xl font-bold transition-colors hover:bg-gray-100">
                                +
                            </button>
                        </div>

                        <button type="submit"
                                class="flex-1 flex items-center justify-center gap-3 py-4 text-sm font-bold tracking-[0.2em] uppercase transition-all bg-black text-white hover:bg-gray-900">
                            Add To Cart
                        </button>
                    </div>

                    <p class="text-sm text-gray-500 font-medium">
                        Stock QTY: <span th:text="${product.stockQuantity}"></span>
                    </p>
                </form>

                <!-- Product info -->
                <div class="mt-16 pt-10 border-t border-gray-200 grid grid-cols-2 gap-8">
                    <div>
                        <p class="text-xs font-bold tracking-[0.2em] uppercase text-gray-500 mb-2">MATERIAL</p>
                        <p class="text-base font-light text-sm">100% Premium Cotton</p>
                    </div>
                    <div>
                        <p class="text-xs font-bold tracking-[0.2em] uppercase text-gray-500 mb-2">CARE</p>
                        <p class="text-base font-light text-sm">Machine wash cold</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<div th:replace="~{fragments/layout :: footer}"></div>

<script>
    const minusBtn = document.getElementById("minusBtn");
    const plusBtn = document.getElementById("plusBtn");
    const quantityDisplay = document.getElementById("quantityDisplay");
    const pairQuantityInput = document.getElementById("pairQuantity");

    let quantity = 1;

    plusBtn.addEventListener("click", function () {
        quantity++;
        quantityDisplay.textContent = quantity;
        pairQuantityInput.value = quantity;
    });

    minusBtn.addEventListener("click", function () {
        if (quantity > 1) {
            quantity--;
            quantityDisplay.textContent = quantity;
            pairQuantityInput.value = quantity;
        }
    });

    const logoInput = document.getElementById("customLogoImage");
    const logoPreview = document.getElementById("logoPreview");
    const shirtLogoPreview = document.getElementById("shirtLogoPreview");

    logoInput.addEventListener("change", function () {
        const file = this.files[0];

        if (!file) {
            logoPreview.classList.add("hidden");
            logoPreview.src = "";

            shirtLogoPreview.classList.add("hidden");
            shirtLogoPreview.src = "";
            return;
        }

        if (file.size > 5 * 1024 * 1024) {
            alert("File must be less than 5MB");
            this.value = "";

            logoPreview.classList.add("hidden");
            logoPreview.src = "";

            shirtLogoPreview.classList.add("hidden");
            shirtLogoPreview.src = "";
            return;
        }

        const previewUrl = URL.createObjectURL(file);

        logoPreview.src = previewUrl;
        logoPreview.classList.remove("hidden");

        shirtLogoPreview.src = previewUrl;
        shirtLogoPreview.classList.remove("hidden");
    });
</script>
</body>
</html>
