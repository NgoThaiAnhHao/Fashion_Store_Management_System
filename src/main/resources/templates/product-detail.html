<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link th:href="@{/css/fonts.css}" rel="stylesheet" />
    <link th:href="@{/css/globals.css}" rel="stylesheet" />
    <link th:href="@{/css/index.css}" rel="stylesheet" />
    <link th:href="@{/css/theme.css}" rel="stylesheet" />
</head>
<body>
    <!-- Navbar -->
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="pt-20 bg-white">
        <div class="max-w-7xl mx-auto px-6 lg:px-8 py-12 lg:py-20">
            <!-- Breadcrumb -->
            <a th:href="@{/fashion-store/dashboard}"
               class="inline-flex items-center gap-2 text-xs font-bold tracking-[0.2em] uppercase text-gray-600 hover:text-black transition-colors mb-12">
                BACK TO SHOP
            </a>

            <div class="flex gap-12">
                <!-- Image gallery -->
                <div class="w-1/3 overflow-hidden">
                    <!-- If product was added before -->
                    <img th:if="${#strings.startsWith(product.imageUrl, 'images')}"
                         th:src="@{'/' + ${product.imageUrl}}"
                         alt="Product Image"
                         class="w-full h-auto border border-black border-2 object-cover group-hover:scale-105 transition-transform duration-600"
                    />

                    <!-- If product was uploaded by user -->
                    <img th:if="${!#strings.startsWith(product.imageUrl, 'images')}"
                         th:src="@{'/uploads/products/' + ${product.productId} + '/' + ${product.imageUrl}}"
                         alt="Product Image"
                         class="w-full h-auto border border-black border-2 object-cover group-hover:scale-105 transition-transform duration-600"
                    />
                </div>

                <!-- Details -->
                <div class="w-full">
                    <p class="text-xs font-bold tracking-[0.3em] uppercase text-gray-500 mb-6">COUPLE SET</p>

                    <h1 th:text="${product.name}" class="text-3xl font-black tracking-tighter"></h1>

                    <p class="text-xl font-bold mb-10">
                        $<span th:text="${product.salePrice}" ></span>
                    </p>

                    <p th:text="${product.description}"
                        class="text-base text-gray-700 leading-relaxed mb-10 pb-10 border-b border-gray-200 font-light">
                    </p>

<!--                    <div class="mb-8 p-6 bg-gray-100 border-2 border-gray-200 flex items-start gap-4">-->
<!--                        <div>-->
<!--                            <p class="text-base font-bold mb-3 tracking-wide uppercase">LOGIN REQUIRED</p>-->
<!--                            <p class="text-sm text-gray-700 mb-4 font-light">-->
<!--                                Please sign in to customize and purchase this product-->
<!--                            </p>-->
<!--                            <a href="#"-->
<!--                                    class="inline-block bg-black text-white px-8 py-3 text-xs font-bold tracking-[0.2em] uppercase hover:bg-gray-900 transition-colors">-->
<!--                                SIGN IN NOW-->
<!--                            </a>-->
<!--                        </div>-->
<!--                    </div>-->

                    <!-- Success message after register -->
                    <div th:if="${successMessage}"
                         class="text-xs bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative " role="alert">
                        <span th:text="${successMessage}" class="block sm:inline"></span>
                    </div>

                     <form th:action="@{/fashion-store/cart/add-to-cart/{productId}(productId=${product.productId})}"
                           th:object="${cartItem}"
                           class="space-y-10"
                           method="POST">
                         <input type="hidden"
                                th:field="*{pairQuantity}"
                                id="pairQuantity"
                                value="1">

                        <!-- Male size -->
                        <div>
                            <div class="flex items-center justify-between mb-5">
                                <label class="text-xs font-bold tracking-[0.2em] uppercase">HIS SIZE</label>
                            </div>
                            <div class="flex flex-wrap gap-3">
                                <select th:field="*{maleSize}" id="hisSize" name="hisSize" class="appearance-none w-full px-6 py-3 border-2 text-base transition-all font-light border-gray-300 focus:border-black focus:outline-none">
                                    <option value="S">S</option>
                                    <option value="M">M</option>
                                    <option value="L" selected>L</option>
                                    <option value="XL">XL</option>
                                    <option value="2XL">2XL</option>
                                    <option value="3XL">3XL</option>
                                </select>
                            </div>
                        </div>

                        <!-- Female size -->
                        <div>
                            <div class="flex items-center justify-between mb-5">
                                <label class="text-xs font-bold tracking-[0.2em] uppercase">HER SIZE</label>
                            </div>
                            <div class="flex flex-wrap gap-3">
                                <select th:field="*{femaleSize}" id="herSize" name="herSize" class="appearance-none w-full px-6 py-3 border-2 text-base transition-all font-light border-gray-300 focus:border-black focus:outline-none">
                                    <option value="S">S</option>
                                    <option value="M">M</option>
                                    <option value="L" selected>L</option>
                                    <option value="XL">XL</option>
                                    <option value="2XL">2XL</option>
                                    <option value="3XL">3XL</option>
                                </select>
                            </div>
                        </div>

                        <!-- Logo text -->
                        <div>
                            <label class="block text-xs font-bold tracking-[0.2em] uppercase mb-5">
                                CUSTOM TEXT
                                <span class="text-gray-400 normal-case tracking-normal font-light">(Optional)</span>
                            </label>
                            <input
                                    th:field="*{customLogoText}"
                                    id="logoText"
                                    name="logoText"
                                    type="text"
                                    placeholder="YOUR TEXT HERE"
                                    maxLength="40"
                                    class="w-full px-6 py-2 border-2 text-base transition-all font-light border-gray-300 focus:border-black focus:outline-none">

                            <p class="mt-3 text-xs text-gray-500 font-light">Text Length / 40 characters</p>
                        </div>

                        <!-- Quantity + Add to cart -->
                        <div class="flex gap-4 pt-4">
                            <div class="flex items-center border-2 border-gray-300 bg-white">
                                <button type="button"
                                        id="minusBtn"
                                        class="w-12 h-12 flex items-center justify-center text-xl font-bold transition-colors hover:bg-gray-100" >
                                −
                                </button>

                                <span id="quantityDisplay"
                                      class="w-12 h-12 flex items-center justify-center border-x-2 border-gray-300 text-xl font-bold">1</span>

                                <button type="button"
                                        id="plusBtn"
                                        class="w-12 h-12 flex items-center justify-center text-xl font-bold transition-colors hover:bg-gray-100">
                                +
                                </button>
                            </div>

                            <button class="flex-1 flex items-center justify-center gap-3 py-4 text-sm font-bold tracking-[0.2em] uppercase transition-all bg-black text-white hover:bg-gray-900">
                                Add To Cart
                            </button>
                        </div>
                         <p class="text-sm text-gray-500 font-medium">
                             Stock QTY: <span th:text="${product.stockQuantity}"></span>
                         </p>
                    </form>

                    <!-- Product info -->
                    <div class="mt-16 pt-10 border-t border-gray-200 grid grid-cols-2 gap-8">
                        <div>
                            <p class="text-xs font-bold tracking-[0.2em] uppercase text-gray-500 mb-2">MATERIAL</p>
                            <p class="text-base font-light text-sm">100% Premium Cotton</p>
                        </div>
                        <div>
                            <p class="text-xs font-bold tracking-[0.2em] uppercase text-gray-500 mb-2">CARE</p>
                            <p class="text-base font-light text-sm">Machine wash cold</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div th:replace="~{fragments/layout :: footer}"></div>

    <script>
        const minusBtn = document.getElementById("minusBtn");
        const plusBtn = document.getElementById("plusBtn");
        const quantityDisplay = document.getElementById("quantityDisplay");
        const pairQuantityInput  = document.getElementById("pairQuantity");

        let quantity = 1;

        plusBtn.addEventListener("click", function () {
            quantity++;
            quantityDisplay.textContent = quantity;
            pairQuantityInput.value = quantity;
        });

        minusBtn.addEventListener("click", function () {
            if (quantity > 1) {
                quantity--;
                quantityDisplay.textContent = quantity;
                pairQuantityInput.value = quantity;
            }
        });
    </script>
</body>
</html>
