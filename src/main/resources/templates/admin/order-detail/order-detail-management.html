<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Detail Management | Fashion Store</title>
    <link rel="shortcut icon" href="//cdn.hstatic.net/themes/1000184601/1001406013/14/favicon.png?v=1538" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link th:href="@{/css/fonts.css}" rel="stylesheet" />
    <link th:href="@{/css/globals.css}" rel="stylesheet" />
    <link th:href="@{/css/index.css}" rel="stylesheet" />
    <link th:href="@{/css/theme.css}" rel="stylesheet" />
</head>

<body>
<div class="flex h-screen bg-[#FFFFFF] overflow-hidden text-[#0B0B0B]"
     style="font-family: 'DM Sans', 'Inter', system-ui, sans-serif">

    <!-- SideBar -->
    <div th:replace="~{/fragments/sidebar :: sidebar}"></div>

    <!-- Main -->
    <div class="flex-1 flex flex-col overflow-hidden w-100">
        <main class="flex-1 overflow-y-auto bg-[#FFFFFF]">

            <!-- Topbar -->
            <div th:replace="~{fragments/topbar :: topbar}"></div>

            <div class="max-w-7xl mx-auto px-4 sm:px-6 py-10">

                <!-- Back button -->
                <a th:href="@{/fashion-store/orders}"
                   class="inline-flex items-center gap-2 mb-6 text-xs font-bold tracking-[0.18em] uppercase text-[#6B7280] hover:text-[#0B0B0B] transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg"
                         width="16"
                         height="16"
                         viewBox="0 0 24 24"
                         fill="none"
                         stroke="currentColor"
                         stroke-width="2"
                         stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="m12 19-7-7 7-7"/>
                        <path d="M19 12H5"/>
                    </svg>
                    Back to Order Management
                </a>

                <!-- Page title -->
                <div class="mb-10">
                    <h1 class="text-2xl font-black tracking-[0.2em] uppercase text-[#0B0B0B]">
                        Order Details -
                        <span class="tracking-[0.25em]">Order #</span><span th:text="${order.orderId}"></span>
                    </h1>

                    <p class="mt-2 text-sm font-bold tracking-[0.15em] uppercase text-[#0B0B0B]">
                        Order by
                        <span th:text="${order.orderedBy.fullName}"></span>
                    </p>
                </div>

                <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">

                    <!-- Order Items -->
                    <div class="xl:col-span-2 bg-[#FAFAFA] border border-[#E5E7EB] rounded-xl p-6">

                        <div class="flex items-center justify-between border-b border-[#E5E7EB] pb-4 mb-6">
                            <h2 class="text-sm font-bold tracking-[0.2em] uppercase text-[#0B0B0B]">
                                Product
                            </h2>
                        </div>

                        <!-- Item Detail -->
                        <div th:each="orderDetail : ${orderDetails}"
                             class="flex flex-col gap-6 border-b border-[#E5E7EB]/70 last:border-b-0 pb-6 mb-6 last:pb-0 last:mb-0">

                            <!-- Product + Customization -->
                            <div class="flex flex-col xl:flex-row xl:items-start gap-6">

                                <!-- Product Info -->
                                <div class="flex gap-5 flex-1 min-w-0">

                                    <!-- Product Image -->
                                    <div class="w-28 h-32 shrink-0 rounded-lg overflow-hidden border border-[#E5E7EB] bg-white">
                                        <!-- Default image -->
                                        <img th:if="${#strings.startsWith(orderDetail.product.imageUrl, 'images')}"
                                             th:src="@{'/' + ${orderDetail.product.imageUrl}}"
                                             alt="Product Image"
                                             class="w-full h-full object-cover"/>

                                        <!-- Uploaded product image -->
                                        <img th:if="${!#strings.startsWith(orderDetail.product.imageUrl, 'images')}"
                                             th:src="@{'/uploads/products/' + ${orderDetail.product.productId} + '/' + ${orderDetail.product.imageUrl}}"
                                             alt="Product Image"
                                             class="w-full h-full object-cover"/>
                                    </div>

                                    <!-- Product Text -->
                                    <div class="flex-1 min-w-0">
                                        <h3 th:text="${orderDetail.product.name}"
                                            class="text-base font-bold text-[#0B0B0B] mb-1">
                                            Product Name
                                        </h3>

                                        <p class="text-sm text-[#9CA3AF] mb-3">
                                            Set · $<span th:text="${orderDetail.product.price}"></span>
                                        </p>
                                    </div>
                                </div>

                                <!-- Customization Details -->
                                <div th:if="${(orderDetail.logoText != null and !orderDetail.logoText.isEmpty()) or (orderDetail.logoImageUrl != null and !orderDetail.logoImageUrl.isEmpty())}"
                                     class="w-full xl:w-[430px] rounded-xl border border-[#E5E7EB] bg-white p-5">

                                    <p class="text-[10px] font-bold tracking-[0.2em] uppercase text-[#9CA3AF] mb-4">
                                        Customization
                                    </p>

                                    <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-5">

                                        <!-- Custom Info Left -->
                                        <div class="flex-1 min-w-0">

                                            <!-- Custom Text -->
                                            <p th:if="${orderDetail.logoText != null and !orderDetail.logoText.isEmpty()}"
                                               class="text-sm text-[#6B7280] mb-4">
                                                <span class="font-medium text-[#0B0B0B]">Text:</span>
                                                "<span th:text="${orderDetail.logoText}"></span>"
                                            </p>

                                            <!-- Logo Size -->
                                            <p th:if="${orderDetail.logoSize != null and !orderDetail.logoSize.isEmpty()}"
                                               class="text-sm text-[#9CA3AF] mt-2">
                                                Logo Size:
                                                <span class="font-medium text-[#6B7280]" th:text="${orderDetail.logoSize}"></span>
                                            </p>

                                            <!-- Logo Position -->
                                            <p th:if="${orderDetail.logoPosition != null and !orderDetail.logoPosition.isEmpty()}"
                                               class="text-sm text-[#9CA3AF]">
                                                Logo Position:
                                                <span class="font-medium text-[#6B7280]" th:text="${orderDetail.logoPosition}"></span>
                                            </p>
                                        </div>

                                        <!-- Custom Logo Image Right -->
                                        <div th:if="${orderDetail.logoImageUrl != null and !orderDetail.logoImageUrl.isEmpty()}"
                                             class="shrink-0">
                                            <p class="text-sm font-medium text-[#9CA3AF] mb-2 text-left sm:text-right">
                                                Custom logo:
                                            </p>

                                            <img th:src="@{'/uploads/custom-logos/' + ${orderDetail.logoImageUrl}}"
                                                 alt="Custom Logo"
                                                 class="w-36 h-36 object-contain rounded-xl border border-[#E5E7EB] bg-white p-2"/>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Member Info -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                                <!-- Member 1 -->
                                <div class="bg-white rounded-xl border border-[#E5E7EB] p-4">
                                    <div class="flex items-center justify-between gap-4 mb-4">
                                        <p class="text-[10px] font-bold tracking-[0.2em] uppercase text-[#9CA3AF]">
                                            Member 1
                                        </p>
                                    </div>

                                    <div class="space-y-3 text-sm">
                                        <div class="flex justify-between gap-4">
                                            <span class="text-[#6B7280]">Size</span>
                                            <span class="font-bold text-[#0B0B0B]" th:text="${orderDetail.member1Size}"></span>
                                        </div>

                                        <div class="flex justify-between gap-4">
                                            <span class="text-[#6B7280]">Gender</span>
                                            <span class="font-bold text-[#0B0B0B]" th:text="${orderDetail.member1Gender}"></span>
                                        </div>

                                        <div class="flex justify-between gap-4">
                                            <span class="text-[#6B7280]">Quantity</span>
                                            <span class="font-bold text-[#0B0B0B]" th:text="${orderDetail.member1Quantity}"></span>
                                        </div>
                                    </div>
                                </div>

                                <!-- Member 2 -->
                                <div class="bg-white rounded-xl border border-[#E5E7EB] p-4">
                                    <div class="flex items-center justify-between gap-4 mb-4">
                                        <p class="text-[10px] font-bold tracking-[0.2em] uppercase text-[#9CA3AF]">
                                            Member 2
                                        </p>
                                    </div>

                                    <div class="space-y-3 text-sm">
                                        <div class="flex justify-between gap-4">
                                            <span class="text-[#6B7280]">Size</span>
                                            <span class="font-bold text-[#0B0B0B]" th:text="${orderDetail.member2Size}"></span>
                                        </div>

                                        <div class="flex justify-between gap-4">
                                            <span class="text-[#6B7280]">Gender</span>
                                            <span class="font-bold text-[#0B0B0B]" th:text="${orderDetail.member2Gender}"></span>
                                        </div>

                                        <div class="flex justify-between gap-4">
                                            <span class="text-[#6B7280]">Quantity</span>
                                            <span class="font-bold text-[#0B0B0B]" th:text="${orderDetail.member2Quantity}"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Product Total: bottom right -->
                            <div class="flex justify-end">
                                <div class="text-right min-w-[120px]">
                                    <p class="text-[10px] font-bold tracking-[0.2em] uppercase text-[#9CA3AF] mb-2">
                                        Item Total
                                    </p>

                                    <p class="text-lg font-bold text-[#0B0B0B]">
                                        $<span th:text="${orderDetail.subTotal}"></span>
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Payment -->
                    <div class="bg-[#FAFAFA] border border-[#E5E7EB] rounded-xl p-6 h-fit sticky top-24">
                        <h2 class="text-lg font-bold tracking-[0.25em] uppercase text-[#0B0B0B] mb-8">
                            Payment #<span th:text="${payment.paymentId}"></span>
                        </h2>

                        <div class="space-y-5">
                            <div class="flex items-center justify-between">
                                <span class="text-sm text-[#6B7280]">Method</span>

                                <span th:if="${payment.paymentMethod.toString() == 'COD'}"
                                      class="text-sm font-bold text-emerald-700">
                                    <span th:text="${payment.paymentMethod.toString()}"></span>
                                </span>

                                <span th:if="${payment.paymentMethod.toString() == 'CARD'}"
                                      class="text-sm font-bold text-blue-700">
                                    <span th:text="${payment.paymentMethod.toString()}"></span>
                                </span>
                            </div>

                            <div class="flex items-center justify-between">
                                <span class="text-sm text-[#6B7280]">Date</span>
                                <span th:text="${payment.getFormattedCreatedAt()}"
                                      class="text-sm font-bold text-[#0B0B0B]">
                                </span>
                            </div>

                            <div class="flex items-center justify-between gap-3">
                                <span class="text-sm text-[#6B7280]">Status</span>

                                <form th:action="@{/fashion-store/payment/update-status/{paymentId}(paymentId=${payment.paymentId})}"
                                      method="POST"
                                      class="flex items-center gap-2">

                                    <input type="hidden" name="orderId" th:value="${order.orderId}">

                                    <select name="paymentStatus"
                                            class="text-xs rounded-full px-4 py-1.5 appearance-none border-0 font-bold text-center min-w-[110px]"
                                            th:classappend="
                                                ${payment.paymentStatus.toString() == 'PENDING'} ? 'bg-emerald-100 text-emerald-700' :
                                                (${payment.paymentStatus.toString() == 'REFUNDED'} ? 'bg-blue-100 text-blue-700' :
                                                (${payment.paymentStatus.toString() == 'PAID'} ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700'))
                                            ">

                                        <option value="PENDING"
                                                class="bg-emerald-100 text-emerald-700"
                                                th:selected="${payment.paymentStatus.toString() == 'PENDING'}">
                                            PENDING
                                        </option>

                                        <option value="REFUNDED"
                                                class="bg-blue-100 text-blue-700"
                                                th:selected="${payment.paymentStatus.toString() == 'REFUNDED'}">
                                            REFUNDED
                                        </option>

                                        <option value="PAID"
                                                class="bg-amber-100 text-amber-700"
                                                th:selected="${payment.paymentStatus.toString() == 'PAID'}">
                                            PAID
                                        </option>

                                        <option value="FAILED"
                                                class="bg-red-100 text-red-700"
                                                th:selected="${payment.paymentStatus.toString() == 'FAILED'}">
                                            FAILED
                                        </option>
                                    </select>

                                    <button type="submit"
                                            class="w-8 h-8 flex items-center justify-center rounded-lg text-[#6B7280] hover:text-black hover:bg-[#F3F4F6] transition-colors">
                                        <svg xmlns="http://www.w3.org/2000/svg"
                                             width="18"
                                             height="18"
                                             viewBox="0 0 24 24"
                                             fill="none"
                                             stroke="currentColor"
                                             stroke-width="2"
                                             stroke-linecap="round"
                                             stroke-linejoin="round"
                                             class="lucide lucide-save-icon lucide-save">
                                            <path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>
                                            <path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/>
                                            <path d="M7 3v4a1 1 0 0 0 1 1h7"/>
                                        </svg>
                                    </button>
                                </form>
                            </div>
                        </div>

                        <div class="border-t border-[#E5E7EB] mt-8 pt-6 flex items-center justify-between">
                            <span class="text-base font-medium text-[#0B0B0B]">Total</span>
                            <span class="text-2xl font-black text-[#0B0B0B]">
                                $<span th:text="${payment.totalAmount}"></span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

</body>
</html>
