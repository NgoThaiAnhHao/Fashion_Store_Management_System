<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Management | Fashion Store</title>
    <link rel="shortcut icon" href="//cdn.hstatic.net/themes/1000184601/1001406013/14/favicon.png?v=1538" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link th:href="@{/css/fonts.css}" rel="stylesheet" />
    <link th:href="@{/css/globals.css}" rel="stylesheet" />
    <link th:href="@{/css/index.css}" rel="stylesheet" />
    <link th:href="@{/css/theme.css}" rel="stylesheet" />
</head>
<body>
<div class="flex h-screen bg-[ #FFFFFF] overflow-hidden text-[#0B0B0B]"
     style="font-family: 'DM Sans', 'Inter', system-ui, sans-serif">

    <!-- SideBar -->
    <div th:replace="~{/fragments/sidebar :: sidebar}"></div>

    <!-- Main -->
    <div class="flex-1 flex flex-col overflow-hidden w-100">
        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-[ #FFFFFF]">
            <!-- Topbar -->
            <div th:replace="~{fragments/topbar :: topbar}"></div>

            <div class="p-6 space-y-5 bg-[ #FFFFFF] min-h-full">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-xl font-bold text-[#0B0B0B]">Order Management</h1>
                        <p class="text-sm text-[#6B6B6B] mt-0.5">
                            <span th:text="${orders.size()}"></span> Order
                        </p>
                    </div>
                </div>

                <!-- Filters -->
                <div class="bg-[#FAFAFA] rounded-xl border border-[#E5E7EB] p-4 flex flex-wrap gap-3 items-center">
                    <div class="flex items-center gap-2 bg-[#F3F4F6] rounded-lg px-3 py-2 min-w-[220px] flex-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search-icon lucide-search"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
                        <input type="text"
                               placeholder="Search by order.."
                               class="bg-transparent text-sm text-[#0B0B0B] placeholder:text-[#6B7280]/70 outline-none w-full">
                    </div>
                </div>

                <!-- Error message when categories empty -->
                <div class="flex justify-center items-center">
                    <ul th:if="${orders.isEmpty()}" class="text-xs bg-red-100 border border-red-400 text-red-700 px-10 py-3 mb-3 rounded relative " role="alert">
                        <li class="block">No data for order</li>
                    </ul>
                </div>

                <!-- Table -->
                <div th:if="${!orders.isEmpty()}" class="bg-[#FAFAFA] rounded-xl border border-[#E5E7EB] overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                            <tr class="bg-[#F3F4F6] border-b border-[#E5E7EB]">
                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Order ID
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Total Amount
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Shipping Address
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Receiver Name
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Receiver Phone
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    City
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Zipcode
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Ordered By
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Ordered Date
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Status
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Actions
                                </th>
                            </tr>

                            </thead>

                            <tbody>
                            <tr th:each="order : ${orders}" class="border-b border-[#E5E7EB]/60 hover:bg-[#FBF8F4] transition-colors">
                                <td class="text-center px-4 py-3 text-xs font-medium text-[#0B0B0B] whitespace-nowrap">
                                    #<span th:text="*{order.orderId}" ></span>
                                </td>

                                <td class="font-bold px-4 py-3 text-xs text-[#6B6B6B]">
                                    $<span th:text="*{order.totalAmount}"></span>
                                </td>

                                <td th:text="*{order.shippingAddress}" class="px-4 py-3 text-xs text-[#6B6B6B] whitespace-nowrap"></td>

                                <td th:text="*{order.receiverName}" class="px-4 py-3 text-xs text-[#6B7280] whitespace-nowrap"></td>

                                <td th:text="*{order.receiverPhone}" class="px-4 py-3 text-xs text-[#6B7280] whitespace-nowrap"></td>

                                <td th:text="*{order.city}" class="px-4 py-3 text-xs text-[#6B7280] whitespace-nowrap"></td>

                                <td th:text="*{order.zipcode}" class="px-4 py-3 text-xs text-[#6B7280] whitespace-nowrap"></td>

                                <td th:text="*{order.orderedBy.fullName}" class="font-medium px-4 py-3 text-xs text-[#6B6B6B] whitespace-nowrap"></td>

                                <td th:text="*{order.getFormattedOrderedAt()}" class="px-4 py-3 text-xs text-[#6B7280] whitespace-nowrap"></td>

                                <td class="px-4 py-3 whitespace-nowrap">
                                    <form th:action="@{/fashion-store/orders/update-status/{orderId}(orderId=${order.orderId})}"
                                          method="POST"
                                            class="flex flex-col justify-center items-center gap-2">
                                        <select name="status"
                                                th:id="'status-' + ${order.orderId}"
                                                class="text-xs rounded-full px-3 py-1 appearance-none border-0 font-medium "
                                                th:classappend="
                                                    *{order.status.toString() == 'PENDING'} ? 'bg-emerald-100 text-emerald-700' :
                                                    (*{order.status.toString() == 'CONFIRMED'} ? 'bg-amber-100 text-amber-700' :
                                                    (*{order.status.toString() == 'SHIPPING'} ? 'bg-blue-100 text-blue-700' :
                                                    (*{order.status.toString() == 'COMPLETED'} ? 'bg-slate-100 text-slate-500' :
                                                    (*{order.status.toString() == 'CANCELLED'} ? 'bg-red-100 text-red-700' : 'bg-red-100 text-red-700'))))
                                                ">

                                            <option value="PENDING"
                                                    class="bg-emerald-100 text-emerald-700"
                                                    th:selected="${order.status.toString() == 'PENDING'}">
                                                Pending
                                            </option>

                                            <option value="CONFIRMED"
                                                    class="bg-amber-100 text-amber-700"
                                                    th:selected="${order.status.toString() == 'CONFIRMED'}">
                                                Confirmed
                                            </option>

                                            <option value="SHIPPING"
                                                    class="bg-blue-100 text-blue-700"
                                                    th:selected="${order.status.toString() == 'SHIPPING'}">
                                                Shipping
                                            </option>

                                            <option value="COMPLETED"
                                                    class="bg-slate-100 text-slate-500"
                                                    th:selected="${order.status.toString() == 'COMPLETED'}">
                                                Completed
                                            </option>

                                            <option value="CANCELLED"
                                                    class="bg-red-100 text-red-700"
                                                    th:selected="${order.status.toString() == 'CANCELLED'}">
                                                Cancelled
                                            </option>

                                            <option value="LOGO_REJECTED"
                                                    class="bg-red-100 text-red-700"
                                                    th:selected="${order.status.toString() == 'LOGO_REJECTED'}">
                                                Logo Rejected
                                            </option>
                                        </select>

                                        <textarea name="rejectReason"
                                                  th:id="'rejectReason-' + ${order.orderId}"
                                                  rows="2"
                                                  placeholder="Reason for logo rejection (optional)"
                                                  class="hidden text-xs rounded-md px-3 py-1 border border-[#E5E7EB] focus:outline-none focus:ring-1 focus:ring-[#6B7280]"
                                                  th:text="${order.rejectReason}"></textarea>

                                        <button type="submit">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-save-icon lucide-save"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/><path d="M7 3v4a1 1 0 0 0 1 1h7"/></svg>
                                        </button>
                                    </form>
                                </td>

                                <td class="px-4 py-3">
                                    <div class="flex items-center gap-1">
                                        <!-- View Order Detail-->
                                        <a th:href="@{/fashion-store/order-detail/{orderId}(orderId=${order.orderId})}" class="w-7 h-7 rounded-lg flex items-center justify-center text-[#6B7280] transition-all">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucude-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>                                        </a>

                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('select[name="status"]').forEach(function(selectElement) {
            const orderId = selectElement.id.split('-')[1]; // Extract orderId from select's ID
            const rejectReasonTextarea = document.getElementById('rejectReason-' + orderId);

            function toggleRejectReasonVisibility() {
                if (selectElement.value === 'LOGO_REJECTED') {
                    rejectReasonTextarea.classList.remove('hidden');
                } else {
                    rejectReasonTextarea.classList.add('hidden');
                    // Do not clear the reason here, as it might be pre-filled from the server
                }
            }

            // Initial check on page load
            toggleRejectReasonVisibility();

            // Add event listener for changes
            selectElement.addEventListener('change', toggleRejectReasonVisibility);
        });
    });
</script>
</body>
</html>
