<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link th:href="@{/css/fonts.css}" rel="stylesheet" />
    <link th:href="@{/css/globals.css}" rel="stylesheet" />
    <link th:href="@{/css/index.css}" rel="stylesheet" />
    <link th:href="@{/css/theme.css}" rel="stylesheet" />
</head>
<body>
<div class="flex h-screen bg-[#F5F1EB] overflow-hidden text-[#222222]"
     style="font-family: 'DM Sans', 'Inter', system-ui, sans-serif">

    <!-- SideBar -->
    <div th:replace="~{/fragments/sidebar :: sidebar}"></div>

    <!-- Main -->
    <div class="flex-1 flex flex-col overflow-hidden w-100">
        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-[#F5F1EB] flex justify-center">
            <div class="p-6 space-y-6 w-full">
                <div>
                    <h1 class="text-xl font-bold text-slate-900">Admin Profile</h1>
                    <p class="text-sm text-slate-500 mt-0.5">Manage your personal information and security settings</p>
                </div>

                <!-- Avatar & basic -->
                <div class="bg-white rounded-xl border border-slate-200 p-6">
                    <div class="flex items-center gap-5 mb-6">
                        <div class="relative">
                            <!-- Use default avatar if user profile photo is null -->
                            <div th:if="${user != null and user.avatarUrl == null}"
                                 th:text="${user.getFirstCharOfFullName()}"
                                 class="w-24 h-24 rounded-full bg-[#D8C3A5] flex items-center justify-center text-[30px] font-bold text-[#1F1B18] flex-shrink-0">
                            </div>

                            <!-- Use user's avatar if user profile photo is not null -->
                            <img th:if="${user != null and user.avatarUrl != null}"
                                 th:src="@{'/images/users/' + ${user.userId} + '/' + ${user.avatarUrl}}"
                                 alt="Profile photo"
                                 class="w-24 h-24 rounded-full object-cover border-2 border-[#D8C3A5]"
                            />
                        </div>
                        <div>
                            <div th:text="${user.fullName}" class="text-lg font-bold text-slate-900"></div>
                            <div th:text="${user.email}" class="text-sm text-slate-500"></div>
                            <div class="flex items-center gap-1.5 mt-2">
                                <div th:if="${user.isEnabled()}" class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-[#DFF2E2] text-[#2E7D32]">
                                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full mr-1.5"></span>
                                    Active
                                </div>

                                <div th:if="${!user.isEnabled()}" class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-[#F3EEE8] text-[#8A6B45]">
                                    <span class="w-1.5 h-1.5 bg-slate-400 rounded-full mr-1.5"></span>
                                    Inactive
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Form fields -->
                    <form th:action="@{/fashion-store/users/update-profile/{id}(id=${user.userId})}"
                          th:object="${user}"
                          method="POST"
                          class="grid grid-cols-1 sm:grid-cols-2 gap-4"
                          enctype="multipart/form-data">

                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1.5 flex items-center gap-1.5">
                                Full Name
                            </label>
                            <input th:field="*{fullName}"
                                   class="w-full border rounded-xl px-3 py-2.5 text-sm text-slate-700 outline-none transition-colors border-indigo-300 focus:border-indigo-500 bg-white"/>
                        </div>

                        <div>
                            <label  class="block text-xs font-semibold text-slate-600 mb-1.5 flex items-center gap-1.5">
                                Phone Number
                            </label>
                            <input th:field="*{phone}" class="w-full border rounded-xl px-3 py-2.5 text-sm text-slate-700 outline-none transition-colors border-indigo-300 focus:border-indigo-500 bg-white"/>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1.5 flex items-center gap-1.5">
                                Home Address
                            </label>
                            <input th:field="*{homeAddress}"
                                   class="w-full border rounded-xl px-3 py-2.5 text-sm text-slate-700 outline-none transition-colors border-indigo-300 focus:border-indigo-500 bg-white"/>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1.5 flex items-center gap-1.5">
                                Role
                            </label>
                            <select id="role" class="block rounded-xl w-full px-3 py-2.5 bg-neutral-secondary-medium border border-indigo-300 text-heading text-sm rounded-base focus:ring-brand focus:border-brand px-3 py-2.5 shadow-xs placeholder:text-body">-->
                                <option value="customer" th:selected="${user.getRole().getSeparatedRoleName() == 'CUSTOMER'}">Customer</option>
                                <option value="manager" th:selected="${user.getRole().getSeparatedRoleName() == 'MANAGER'}">Manager</option>
                                <option value="admin" th:selected="${user.getRole().getSeparatedRoleName() == 'ADMIN'}">Admin</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-slate-600 mb-1.5 flex items-center gap-1.5">
                                Profile photo
                            </label>
                            <input
                                    type="file"
                                    id="profile-photo"
                                    name="avatar"
                                    accept="image/png, image/jpeg, image/jpg"
                                    class="px-3 py-2.5 rounded-xl cursor-pointer bg-neutral-secondary-medium border border-indigo-300 text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full shadow-xs placeholder:text-body">
                        </div>

                        <div class="col-span-full">
                            <button class="mt-4 flex items-center gap-2 px-5 py-2.5 bg-indigo-500 text-white text-sm font-semibold rounded-xl hover:bg-indigo-600 transition-colors">
                                Save Changes
                            </button>
                        </div>
                    </form>

                </div>
            </div>

        </main>
    </div>
</div>
</body>
</html>
