<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Management | Fashion Store</title>
    <link rel="shortcut icon" href="//cdn.hstatic.net/themes/1000184601/1001406013/14/favicon.png?v=1538" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link th:href="@{/css/fonts.css}" rel="stylesheet" />
    <link th:href="@{/css/globals.css}" rel="stylesheet" />
    <link th:href="@{/css/index.css}" rel="stylesheet" />
    <link th:href="@{/css/theme.css}" rel="stylesheet" />
</head>
<body>
<div class="flex h-screen bg-[ #FFFFFF] overflow-hidden text-[#0B0B0B]"
     style="font-family: 'DM Sans', 'Inter', system-ui, sans-serif">

    <!-- SideBar -->
    <div th:replace="~{/fragments/sidebar :: sidebar}"></div>

    <!-- Main -->
    <div class="flex-1 flex flex-col overflow-hidden w-100">
        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-[ #FFFFFF]">
            <!-- Topbar -->
            <div th:replace="~{fragments/topbar :: topbar}"></div>

            <div class="p-6 space-y-5 bg-[ #FFFFFF] min-h-full">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-xl font-bold text-[#0B0B0B]">User Management</h1>
                        <p class="text-sm text-[#6B6B6B] mt-0.5">
                            <span th:text="${users.size()}"></span> total users
                        </p>
                    </div>
                </div>

                <!-- Filters -->
                <div class="bg-[#FAFAFA] rounded-xl border border-[#E5E7EB] p-4 flex flex-wrap gap-3 items-center">
                    <form th:action="@{/fashion-store/users/search-by-name}"
                          method="GET"
                            class="flex items-center gap-2 bg-[#F3F4F6] rounded-lg px-3 py-2 min-w-[220px] flex-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search-icon lucide-search"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
                        <input type="text"
                               name="keyword"
                                placeholder="Search by name or email..."
                                class="bg-transparent text-sm text-[#0B0B0B] placeholder:text-[#6B7280]/70 outline-none w-full">
                    </form>

                </div>

                <!-- Error message when categories empty -->
                <div class="flex justify-center items-center">
                    <ul th:if="${users.isEmpty()}" class="text-xs bg-red-100 border border-red-400 text-red-700 px-10 py-3 mb-3 rounded relative " role="alert">
                        <li class="block">No data for users</li>
                    </ul>
                </div>

                <!-- Error message -->
                <div th:if="${error}"
                     class="text-xs text-center uppercase bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative " role="alert">
                    <span th:text="${error}" class="block sm:inline"></span>
                </div>

                <!-- Success message after register -->
                <div th:if="${successMessage}"
                     class="text-xs text-center uppercase bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative " role="alert">
                    <span th:text="${successMessage}" class="block sm:inline"></span>
                </div>

                <!-- Table -->
                <div th:if="${!users.isEmpty()}" class="bg-[#FAFAFA] rounded-xl border border-[#E5E7EB] overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                            <tr class="bg-[#F3F4F6] border-b border-[#E5E7EB]">
                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Avatar
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Full Name
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Email
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Phone Number
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Home Address
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Role
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Account Status
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Created Date
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Updated Date
                                </th>

                                <th class="px-4 py-3 text-left text-[10px] font-bold tracking-widest uppercase text-[#6B7280] whitespace-nowrap">
                                    Actions
                                </th>
                            </tr>

                            </thead>

                            <tbody>
                            <tr th:each="user : ${users}" class="border-b border-[#E5E7EB]/60 hover:bg-[#FBF8F4] transition-colors">
                                <td class="px-4 py-3 flex items-center justify-center">
                                    <div class="w-7 h-7 rounded-full bg-[#D6C4AA] flex items-center justify-center text-[11px] font-bold text-[#1F1B18] flex-shrink-0">
                                        <div class="w-7 h-7 rounded-full overflow-hidden border-2 border-[#D6C4AA] flex items-center justify-center bg-white">
                                            <!-- Use default avatar if user profile photo is null -->
                                            <div th:if="${user != null and user.avatarUrl == null}"
                                                 th:text="${user.getFirstCharOfFullName()}"
                                                class="w-7 h-7 rounded-full bg-[#D6C4AA] flex items-center justify-center text-[11px] font-bold text-[#1F1B18] flex-shrink-0">
                                            </div>

                                            <!-- Use user's avatar if user profile photo is not null -->
                                            <img th:if="${user != null and user.avatarUrl != null}"
                                                 th:src="@{'/uploads/users/' + ${user.userId} + '/' + ${user.avatarUrl}}"
                                                 alt="Profile photo"
                                                 class="object-cover"
                                            />
                                        </div>
                                    </div>
                                </td>

                                <td th:text="*{user.fullName}" class="px-4 py-3 text-xs font-medium text-[#0B0B0B] whitespace-nowrap"></td>

                                <td th:text="*{user.email}" class="px-4 py-3 text-xs text-[#6B6B6B]"></td>

                                <td th:text="*{user.phone}" class="px-4 py-3 text-xs text-[#6B6B6B] whitespace-nowrap"></td>

                                <td th:text="*{user.homeAddress}" class="px-4 py-3 text-xs text-[#6B6B6B] whitespace-nowrap"></td>

                                <td class="px-4 py-3">
                                    <span th:text="*{user.getRole().getSeparatedRoleName()}"
                                          class="text-xs font-bold px-2 py-0.5 rounded-full"
                                          th:classappend="
                                                *{user.getRole().getSeparatedRoleName() == 'ADMIN'} ? ' bg-indigo-100 text-indigo-700' :
                                                (*{user.getRole().getSeparatedRoleName() == 'MANAGER'} ? ' bg-purple-100 text-purple-700' :
                                                ' bg-blue-100 text-blue-700')">
                                    </span>
                                </td>

                                <td class="px-4 py-3">
                                    <span class="inline-flex items-center gap-1.5 text-[11px] font-semibold px-2 py-0.5 rounded-full">
                                        <div th:if="${user.isEnabled()}" class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-[#DFF2E2] text-[#2E7D32]">
                                            <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full mr-1.5"></span>
                                                Active
                                        </div>

                                        <div th:if="${!user.isEnabled()}" class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-[#F3F4F6] text-[#6B7280]">
                                            <span class="w-1.5 h-1.5 bg-slate-400 rounded-full mr-1.5"></span>
                                                Inactive
                                        </div>
                                    </span>
                                </td>

                                <td th:text="*{user.getFormattedCreatedAt()}" class="px-4 py-3 text-xs text-[#6B7280] whitespace-nowrap"></td>

                                <td th:text="*{user.getFormattedUpdatedAt()}" class="px-4 py-3 text-xs text-[#6B7280] whitespace-nowrap"></td>

                                <td class="px-4 py-3">
                                    <div class="flex items-center gap-1">
                                        <!-- Edit User -->
                                        <a th:href="@{/fashion-store/users/edit/{id}(id=${user.userId})}"
                                                type="button"
                                                class="w-7 h-7 rounded-lg flex items-center justify-center text-[#6B7280] transition-all">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pencil-icon lucide-pencil"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>
                                        </a>

                                        <!-- Update User Status -->
                                        <form th:action="@{/fashion-store/users/update-status/{id}(id=${user.userId})}"
                                              method="POST">
                                            <button type="submit" class="w-7 h-7 rounded-lg flex items-center justify-center text-[#6B7280] transition-all">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock-icon lucide-lock"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                            </button>
                                        </form>

                                        <!-- Delete User -->
                                        <form th:action="@{/fashion-store/users/delete/{id}(id=${user.userId})}"
                                                method="POST">
                                            <button type="submit" class="w-7 h-7 rounded-lg flex items-center justify-center text-[#6B7280] transition-all">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash-icon lucide-trash"><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>


</body>
</html>
