<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Custom Your Tee | Fashion Store</title>

    <link rel="shortcut icon"
          href="//cdn.hstatic.net/themes/1000184601/1001406013/14/favicon.png?v=1538"
          type="image/png">

    <script src="https://cdn.tailwindcss.com"></script>

    <link th:href="@{/css/fonts.css}" rel="stylesheet"/>
    <link th:href="@{/css/globals.css}" rel="stylesheet"/>
    <link th:href="@{/css/index.css}" rel="stylesheet"/>
    <link th:href="@{/css/theme.css}" rel="stylesheet"/>
</head>

<body class="bg-white text-black">
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="h-[72px]"></div>

<main class="bg-white min-h-screen">
    <div class="max-w-[1120px] mx-auto px-3 py-8 lg:py-10">

        <a th:href="@{/fashion-store/dashboard}"
           class="inline-block mb-8 text-[13px] text-blue-600 hover:underline">
            Back to shop
        </a>

        <h1 class="mb-9 text-[22px] lg:text-[26px] font-bold tracking-[0.22em] uppercase">
            Custom Your Tee
        </h1>

        <!-- Error Message -->
        <div th:if="${errorMessage}"
             class="mb-6 border border-red-200 bg-red-50 px-5 py-4 text-red-700 text-sm">
            <p th:text="${errorMessage}"></p>
        </div>

        <!-- Validation Errors -->
        <div th:if="${errors}"
             class="mb-6 border border-red-200 bg-red-50 px-5 py-4 text-red-700 text-sm">
            <ul class="list-disc pl-5">
                <li th:each="err : ${errors}" th:text="${err}"></li>
            </ul>
        </div>

        <!-- Success Message -->
        <div th:if="${successMessage}"
             class="mb-6 border border-green-200 bg-green-50 px-5 py-4 text-green-700 text-sm">
            <p th:text="${successMessage}"></p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-[440px_1fr] gap-10 items-start">
            <!-- Preview image: stays visible while user scrolls -->
            <aside class="preview-sticky border border-[#e1e4ea] bg-white p-6">
                <h2 class="mb-6 text-[13px] font-bold tracking-[0.35em] uppercase text-[#9ba2b5]">PREVIEW</h2>

                <div class="preview-frame relative overflow-hidden bg-[#f7f7f7]">
                    <img id="productPreview"
                         src=""
                         alt="Product Preview"
                         class="w-full h-full object-cover">

                    <img id="shirtLogoPreview"
                         src=""
                         alt="Logo Preview"
                         class="hidden absolute z-20 object-contain pointer-events-none">

                    <div id="textPreview"
                         class="hidden absolute z-30 max-w-[70%] text-center font-bold uppercase tracking-[0.08em] text-black pointer-events-none break-words">
                    </div>
                </div>
            </aside>

            <form id="customForm"
                  th:action="@{/fashion-store/cart/add-to-cart/0}"
                  th:attr="data-add-cart-base=@{/fashion-store/cart/add-to-cart/}"
                  th:object="${cartItem}"
                  method="POST"
                  enctype="multipart/form-data"
                  class="space-y-10">

            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="redirectToCart" value="true">

            <!-- Choose product -->
            <section class="space-y-6">
                <div>
                    <label class="custom-label">CHOOSE SHIRT</label>
                    <select id="productSelect" class="custom-input appearance-none">
                        <option th:each="product : ${products}"
                                th:value="${product.productId}"
                                th:text="${product.name}"
                                th:data-image-url="${product.imageUrl}"
                                th:data-product-id="${product.productId}">
                        </option>
                    </select>
                </div>
            </section>

            <!-- Size details -->
            <section class="space-y-8">
                <div class="flex items-center justify-between">
                    <h2 class="text-[15px] font-bold tracking-[0.35em] uppercase">SIZE DETAILS</h2>
                    <a href="#" class="text-[14px] text-blue-600 hover:underline">View Size Chart</a>
                </div>

                <div>
                    <label class="custom-label">MEMBER 1 SIZE</label>
                    <select th:field="*{member1Size}" class="custom-input appearance-none">
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                        <option value="2XL">2XL</option>
                        <option value="3XL">3XL</option>
                    </select>
                </div>

                <div>
                    <label class="custom-label">MEMBER 1 GENDER</label>
                    <select th:field="*{member1Gender}" class="custom-input appearance-none">
                        <option value="MALE">MALE</option>
                        <option value="FEMALE">FEMALE</option>
                        <option value="OTHER">OTHER</option>
                    </select>
                </div>

                <div>
                    <label class="custom-label">MEMBER 2 SIZE</label>
                    <select th:field="*{member2Size}" class="custom-input appearance-none">
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                        <option value="2XL">2XL</option>
                        <option value="3XL">3XL</option>
                    </select>
                </div>

                <div>
                    <label class="custom-label">MEMBER 2 GENDER</label>
                    <select th:field="*{member2Gender}" class="custom-input appearance-none">
                        <option value="MALE">MALE</option>
                        <option value="FEMALE">FEMALE</option>
                        <option value="OTHER">OTHER</option>
                    </select>
                </div>
            </section>

            <!-- Custom text -->
            <section class="space-y-8">
                <div>
                    <label class="custom-label">
                        CUSTOM TEXT
                        <span class="text-[#9ba2b5] normal-case tracking-normal font-normal">(Optional)</span>
                    </label>
                    <input th:field="*{customLogoText}"
                           id="logoText"
                           type="text"
                           placeholder="YOUR TEXT HERE"
                           maxlength="40"
                           class="custom-input placeholder:text-[#a8aabf]">
                    <p class="mt-4 text-[13px] text-[#7f8ba3]">
                        Text Length <span id="textLength">0</span> / 40 characters
                    </p>
                </div>

                <div>
                    <label class="custom-label">
                        UPLOAD LOGO
                        <span class="text-[#9ba2b5] normal-case tracking-normal font-normal">(Optional)</span>
                    </label>

                    <div class="border-2 border-dashed border-[#cfd5dd] bg-white py-10 text-center">
                        <input id="customLogoImage"
                               name="customLogoImage"
                               type="file"
                               accept="image/png,image/jpeg,image/jpg,image/svg+xml,image/webp"
                               class="hidden">

                        <label for="customLogoImage" class="cursor-pointer block">
                            <div class="text-[#9ba2b5] text-[18px] tracking-[0.22em] uppercase font-bold">
                                CLICK TO UPLOAD
                            </div>
                            <p class="mt-3 text-[14px] text-[#9ba2b5] tracking-[0.12em] uppercase font-semibold">
                                PNG, JPG, SVG, WEBP - MAX 5MB
                            </p>
                        </label>

                        <img id="logoPreview"
                             src=""
                             alt="Logo Preview"
                             class="hidden mx-auto mt-6 max-h-32 object-contain border border-[#cfd5dd] bg-white p-2">
                    </div>
                </div>
            </section>

            <!-- Logo options: only show after user uploads a logo -->
            <section id="logoOptionsSection" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div>
                    <label class="custom-label">
                        LOGO SIZE <span class="text-red-500">*</span> <span class="text-[#9ba2b5] text-[12px] tracking-normal normal-case font-normal">(Required when logo is uploaded)</span>
                    </label>
                    <select th:field="*{logoSize}" id="logoSize" class="custom-input appearance-none">
                        <option value="">-- Select Logo Size --</option>
                        <option value="SMALL">Small</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="LARGE">Large</option>
                    </select>
                </div>

                <div>
                    <label class="custom-label">
                        LOGO POSITION <span class="text-red-500">*</span> <span class="text-[#9ba2b5] text-[12px] tracking-normal normal-case font-normal">(Required when logo is uploaded)</span>
                    </label>
                    <select th:field="*{logoPosition}" id="logoPosition" class="custom-input appearance-none">
                        <option value="">-- Select Logo Position --</option>
                        <option value="TOP_LEFT">Top Left</option>
                        <option value="TOP_CENTER">Top Center</option>
                        <option value="TOP_RIGHT">Top Right</option>
                        <option value="LEFT_CHEST">Left Chest</option>
                        <option value="CENTER">Center Chest</option>
                        <option value="RIGHT_CHEST">Right Chest</option>
                        <option value="BOTTOM_LEFT">Bottom Left</option>
                        <option value="BOTTOM_CENTER">Bottom Center</option>
                        <option value="BOTTOM_RIGHT">Bottom Right</option>
                        <option value="BACK_TOP_CENTER">Back Top Center</option>
                        <option value="BACK_CENTER">Back Center</option>
                        <option value="BACK_BOTTOM_CENTER">Back Bottom Center</option>
                    </select>
                </div>
            </section>

            <!-- Quantity -->
            <section>
                <input type="hidden" th:field="*{member1Quantity}" id="member1Quantity">
                <input type="hidden" th:field="*{member2Quantity}" id="member2Quantity">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="border-2 border-[#cfd5dd] px-5 py-5">
                        <label class="custom-label mb-4">MEMBER 1 QUANTITY</label>
                        <div class="flex items-center w-fit border border-[#cfd5dd]">
                            <button type="button" id="member1MinusBtn" class="qty-btn">−</button>
                            <span id="member1QuantityDisplay" class="qty-value">1</span>
                            <button type="button" id="member1PlusBtn" class="qty-btn">+</button>
                        </div>
                    </div>

                    <div class="border-2 border-[#cfd5dd] px-5 py-5">
                        <label class="custom-label mb-4">MEMBER 2 QUANTITY</label>
                        <div class="flex items-center w-fit border border-[#cfd5dd]">
                            <button type="button" id="member2MinusBtn" class="qty-btn">−</button>
                            <span id="member2QuantityDisplay" class="qty-value">1</span>
                            <button type="button" id="member2PlusBtn" class="qty-btn">+</button>
                        </div>
                    </div>
                </div>
            </section>

            <button type="submit"
                    class="w-full border-2 border-black bg-black py-5 text-[13px] font-bold tracking-[0.25em] uppercase text-white hover:bg-white hover:text-black transition-colors">
                Add Custom Tee To Cart
            </button>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

<style>
    .preview-sticky {
        position: sticky;
        top: 96px;
        align-self: start;
    }

    .preview-frame {
        width: 100%;
        aspect-ratio: 4 / 5;
        border-radius: 12px;
    }

    @media (max-width: 1023px) {
        .preview-sticky {
            position: static;
        }
    }

    .custom-label {
        display: block;
        margin-bottom: 24px;
        color: #000;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.35em;
        text-transform: uppercase;
    }

    .custom-input {
        width: 100%;
        height: 64px;
        border: 2px solid #cfd5dd;
        border-radius: 0;
        background: #fff;
        padding: 0 30px;
        color: #000;
        font-size: 18px;
        font-weight: 400;
        outline: none;
    }

    .custom-input:focus {
        border-color: #000;
    }

    .qty-btn {
        width: 62px;
        height: 62px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 0;
        background: #fff;
        color: #000;
        font-size: 28px;
        font-weight: 700;
        line-height: 1;
    }

    .qty-btn:hover {
        background: #f7f7f7;
    }

    .qty-value {
        width: 68px;
        height: 62px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-left: 2px solid #cfd5dd;
        border-right: 2px solid #cfd5dd;
        color: #000;
        font-size: 28px;
        font-weight: 700;
        line-height: 1;
    }
</style>

<script>
    const productSelect = document.getElementById("productSelect");
    const productPreview = document.getElementById("productPreview");
    const customForm = document.getElementById("customForm");

    const logoInput = document.getElementById("customLogoImage");
    const logoPreview = document.getElementById("logoPreview");
    const shirtLogoPreview = document.getElementById("shirtLogoPreview");

    const logoText = document.getElementById("logoText");
    const textLength = document.getElementById("textLength");
    const textPreview = document.getElementById("textPreview");

    const logoSizeSelect = document.getElementById("logoSize");
    const logoPositionSelect = document.getElementById("logoPosition");
    const logoOptionsSection = document.getElementById("logoOptionsSection");

    const member1MinusBtn = document.getElementById("member1MinusBtn");
    const member1PlusBtn = document.getElementById("member1PlusBtn");
    const member1QuantityDisplay = document.getElementById("member1QuantityDisplay");
    const member1QuantityInput = document.getElementById("member1Quantity");

    const member2MinusBtn = document.getElementById("member2MinusBtn");
    const member2PlusBtn = document.getElementById("member2PlusBtn");
    const member2QuantityDisplay = document.getElementById("member2QuantityDisplay");
    const member2QuantityInput = document.getElementById("member2Quantity");

    let member1Quantity = Number(member1QuantityInput.value || 1);
    let member2Quantity = Number(member2QuantityInput.value || 1);

    member1QuantityInput.value = member1Quantity;
    member2QuantityInput.value = member2Quantity;
    member1QuantityDisplay.textContent = member1Quantity;
    member2QuantityDisplay.textContent = member2Quantity;

    function buildProductImageUrl(productId, imageUrl) {
        if (!imageUrl) {
            return "";
        }

        if (imageUrl.startsWith("/")) {
            return imageUrl;
        }

        if (imageUrl.startsWith("images")) {
            return "/" + imageUrl;
        }

        return "/uploads/products/" + productId + "/" + imageUrl;
    }

    function updateSelectedProduct() {
        const selectedOption = productSelect.options[productSelect.selectedIndex];

        if (!selectedOption) {
            return;
        }

        const productId = selectedOption.value;
        const imageUrl = selectedOption.getAttribute("data-image-url");

        productPreview.src = buildProductImageUrl(productId, imageUrl);

        const addCartBase = customForm.getAttribute("data-add-cart-base");
        customForm.setAttribute("action", addCartBase + productId);
    }

    function applyLogoSize() {
        const selectedSize = logoSizeSelect.value;

        shirtLogoPreview.style.width = "";
        shirtLogoPreview.style.height = "";
        textPreview.classList.remove("text-sm", "text-lg", "text-2xl");

        if (selectedSize === "SMALL") {
            shirtLogoPreview.style.width = "10%";
            shirtLogoPreview.style.height = "auto";
            textPreview.classList.add("text-sm");
        } else if (selectedSize === "LARGE") {
            shirtLogoPreview.style.width = "20%";
            shirtLogoPreview.style.height = "auto";
            textPreview.classList.add("text-2xl");
        } else {
            shirtLogoPreview.style.width = "15%";
            shirtLogoPreview.style.height = "auto";
            textPreview.classList.add("text-lg");
        }
    }

    function setPosition(top, left, transform) {
        shirtLogoPreview.style.top = top;
        shirtLogoPreview.style.left = left;
        shirtLogoPreview.style.transform = transform;

        textPreview.style.top = top;
        textPreview.style.left = left;
        textPreview.style.transform = transform;
    }

    function applyLogoPosition() {
        const selectedPosition = logoPositionSelect.value;

        shirtLogoPreview.style.top = "";
        shirtLogoPreview.style.left = "";
        shirtLogoPreview.style.transform = "";

        textPreview.style.top = "";
        textPreview.style.left = "";
        textPreview.style.transform = "";

        switch (selectedPosition) {
            case "TOP_LEFT":
                setPosition("10%", "10%", "translate(0%, 0%)");
                break;
            case "TOP_CENTER":
                setPosition("10%", "50%", "translate(-50%, 0%)");
                break;
            case "TOP_RIGHT":
                setPosition("10%", "90%", "translate(-100%, 0%)");
                break;
            case "LEFT_CHEST":
                setPosition("30%", "25%", "translate(-50%, -50%)");
                break;
            case "CENTER":
                setPosition("38%", "50%", "translate(-50%, -50%)");
                break;
            case "RIGHT_CHEST":
                setPosition("30%", "75%", "translate(-50%, -50%)");
                break;
            case "BOTTOM_LEFT":
                setPosition("70%", "10%", "translate(0%, -100%)");
                break;
            case "BOTTOM_CENTER":
                setPosition("70%", "50%", "translate(-50%, -100%)");
                break;
            case "BOTTOM_RIGHT":
                setPosition("70%", "90%", "translate(-100%, -100%)");
                break;
            case "BACK_TOP_CENTER":
                setPosition("15%", "50%", "translate(-50%, 0%)");
                break;
            case "BACK_CENTER":
                setPosition("50%", "50%", "translate(-50%, -50%)");
                break;
            case "BACK_BOTTOM_CENTER":
                setPosition("80%", "50%", "translate(-50%, -100%)");
                break;
            default:
                setPosition("38%", "50%", "translate(-50%, -50%)");
                break;
        }
    }

    function updateCustomPreview() {
        applyLogoSize();
        applyLogoPosition();
    }

    function showLogoOptions() {
        logoOptionsSection.classList.remove("hidden");
    }

    function hideLogoOptions() {
        logoOptionsSection.classList.add("hidden");
        logoSizeSelect.value = "";
        logoPositionSelect.value = "";
    }

    function clearLogoPreviewAndOptions() {
        logoPreview.classList.add("hidden");
        logoPreview.src = "";

        shirtLogoPreview.classList.add("hidden");
        shirtLogoPreview.src = "";

        hideLogoOptions();
    }

    productSelect.addEventListener("change", updateSelectedProduct);
    updateSelectedProduct();
    hideLogoOptions();
    updateCustomPreview();

    logoInput.addEventListener("change", function () {
        const file = this.files[0];

        if (!file) {
            clearLogoPreviewAndOptions();
            return;
        }

        if (file.size > 5 * 1024 * 1024) {
            alert("File must be less than 5MB");
            this.value = "";

            clearLogoPreviewAndOptions();
            return;
        }

        const previewUrl = URL.createObjectURL(file);

        logoPreview.src = previewUrl;
        logoPreview.classList.remove("hidden");

        shirtLogoPreview.src = previewUrl;
        shirtLogoPreview.classList.remove("hidden");

        showLogoOptions();
        updateCustomPreview();
    });

    logoText.addEventListener("input", function () {
        const text = this.value.trim();
        textLength.textContent = String(this.value.length);

        if (!text) {
            textPreview.classList.add("hidden");
            textPreview.textContent = "";
            return;
        }

        textPreview.textContent = text;
        textPreview.classList.remove("hidden");

        updateCustomPreview();
    });

    logoSizeSelect.addEventListener("change", updateCustomPreview);
    logoPositionSelect.addEventListener("change", updateCustomPreview);

    customForm.addEventListener("submit", function (event) {
        const hasUploadedLogo = logoInput && logoInput.files && logoInput.files.length > 0;

        if (hasUploadedLogo && !logoSizeSelect.value) {
            event.preventDefault();
            alert("Please select Logo Size when uploading a logo.");
            logoSizeSelect.focus();
            return;
        }

        if (hasUploadedLogo && !logoPositionSelect.value) {
            event.preventDefault();
            alert("Please select Logo Position when uploading a logo.");
            logoPositionSelect.focus();
        }
    });

    member1PlusBtn.addEventListener("click", function () {
        member1Quantity++;
        member1QuantityDisplay.textContent = member1Quantity;
        member1QuantityInput.value = member1Quantity;
    });

    member1MinusBtn.addEventListener("click", function () {
        if (member1Quantity > 1) {
            member1Quantity--;
            member1QuantityDisplay.textContent = member1Quantity;
            member1QuantityInput.value = member1Quantity;
        }
    });

    member2PlusBtn.addEventListener("click", function () {
        member2Quantity++;
        member2QuantityDisplay.textContent = member2Quantity;
        member2QuantityInput.value = member2Quantity;
    });

    member2MinusBtn.addEventListener("click", function () {
        if (member2Quantity > 1) {
            member2Quantity--;
            member2QuantityDisplay.textContent = member2Quantity;
            member2QuantityInput.value = member2Quantity;
        }
    });
</script>

</body>
</html>
